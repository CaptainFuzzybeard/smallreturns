<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Concierge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface-muted: #EFEDE6;
    --ink: #1C1C1B;
    --ink-2: #55544F;
    --ink-3: #8F8E88;
    --line: #E4E1D7;
    --line-strong: #CFCBBD;
    --accent: #1C1C1B;
    --lost: #7A2222;
    --lost-bg: #F4E4E3;
    --found: #0F5740;
    --found-bg: #E2EDE5;
    --reunited: #8A6E1E;
    --reunited-bg: #F4EDD1;
    --reunited-border: #E7D99A;
    --handoff: #6E4A8C;
    --handoff-bg: #EDE6F4;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.03), 0 4px 12px rgba(0,0,0,0.02);
    --shadow-modal: 0 20px 60px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.06);
    --serif: 'Fraunces', 'Iowan Old Style', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, Monaco, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }

  .page { max-width: 980px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ============ Setup screen ============ */
  .setup {
    max-width: 620px;
    margin: 10vh auto 0;
    padding: 32px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
  }
  .setup h2 { font-family: var(--serif); font-size: 32px; font-weight: 500; margin: 0 0 6px; letter-spacing: -0.02em; }
  .setup p { font-size: 14px; color: var(--ink-2); line-height: 1.6; margin: 0 0 12px; }
  .setup code { font-family: var(--mono); font-size: 12px; background: var(--surface-muted); padding: 2px 6px; border-radius: 4px; }
  .setup ol { padding-left: 20px; color: var(--ink-2); font-size: 14px; line-height: 1.7; }

  /* ============ Masthead ============ */
  .mast {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .mast-eyebrow {
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: var(--ink-3);
    letter-spacing: 0.01em;
    margin-bottom: 6px;
  }
  .mast-title {
    font-family: var(--serif);
    font-size: clamp(34px, 5vw, 48px);
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .mast-tag {
    font-size: 14px;
    color: var(--ink-2);
    max-width: 440px;
    line-height: 1.55;
    margin-top: 10px;
  }
  .mast-reunions { text-align: right; }
  .mast-reunions-num {
    font-family: var(--serif);
    font-size: 40px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.02em;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .reunion-counter-btn {
    background: none;
    border: none;
    padding: 4px 8px;
    margin: -4px -8px 0 0;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: background 0.15s ease;
    text-align: right;
    font-family: inherit;
    color: inherit;
  }
  .reunion-counter-btn:hover { background: var(--surface-muted); }
  .reunion-counter-btn:hover .mast-reunions-lbl { color: var(--ink-2); }
  .reunion-counter-btn:hover::after {
    content: '→';
    display: inline-block;
    margin-left: 4px;
    color: var(--ink-3);
    font-size: 12px;
    vertical-align: middle;
  }
  .mast-reunions-num.bumped {
    transform: scale(1.12);
    color: var(--found);
  }
  .mast-reunions-lbl {
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .sync-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4FB774;
  }
  .sync-dot.syncing { background: #E8A33C; animation: pulse 1s ease-in-out infinite; }
  .sync-dot.error { background: #C94A4A; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ============ Toolbar ============ */
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 18px 0 12px;
    flex-wrap: wrap;
  }
  .tabs {
    display: inline-flex;
    background: var(--surface-muted);
    border-radius: 100px;
    padding: 3px;
    gap: 2px;
  }
  .tab {
    border: none;
    background: transparent;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.005em;
    transition: all 0.15s ease;
  }
  .tab.active {
    background: var(--surface);
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .search-wrap { flex: 1; min-width: 220px; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--ink-3); }
  .search {
    width: 100%;
    height: 38px;
    padding: 0 44px 0 38px;
    font-size: 13.5px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 100px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
    transition: border 0.15s ease;
  }
  .search:focus { border-color: var(--line-strong); }
  .post-btn {
    height: 38px;
    padding: 0 18px;
    font-size: 13.5px;
    font-weight: 500;
    background: var(--ink);
    color: var(--surface);
    border: none;
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.005em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: transform 0.1s ease;
  }
  .post-btn:hover { opacity: 0.92; }
  .post-btn:active { transform: scale(0.98); }

  /* ============ Filters ============ */
  .filters {
    display: flex;
    gap: 6px;
    padding: 0 0 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-right: 6px;
    font-weight: 500;
  }
  .chip {
    border: 1px solid var(--line);
    background: var(--surface);
    padding: 5px 11px;
    font-size: 12px;
    border-radius: 100px;
    cursor: pointer;
    color: var(--ink-2);
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .chip:hover { border-color: var(--line-strong); }
  .chip.active {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }
  .chip-sep {
    width: 1px;
    height: 16px;
    background: var(--line);
    margin: 0 6px;
  }

  /* ============ Me banner ============ */
  .me-banner {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    font-size: 12.5px;
    color: var(--ink-2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 0 0 12px;
  }
  .me-banner b { color: var(--ink); font-weight: 500; font-family: var(--mono); font-size: 12px; }
  .me-banner-link {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12px;
    color: var(--ink-3);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: var(--line);
  }
  .me-banner-link:hover { color: var(--ink); }

  /* ============ Feed ============ */
  .feed {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 6px 0 24px;
    min-height: 200px;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink-3);
    font-size: 14px;
  }

  .card {
    display: grid;
    grid-template-columns: 72px 1fr auto;
    gap: 16px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    align-items: center;
    transition: all 0.2s ease;
  }
  .card:hover { border-color: var(--line-strong); box-shadow: var(--shadow-card); }
  .card.reunited {
    background: var(--reunited-bg);
    border-color: var(--reunited-border);
  }
  .card.reunited .card-title,
  .card.reunited .card-desc { color: var(--reunited); }
  .card.reunited .thumb { background: rgba(138,110,30,0.08); color: var(--reunited); }
  .card.pending-handoff {
    background: var(--handoff-bg);
    border-color: rgba(110,74,140,0.25);
  }
  .card.highlighted {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(28,28,27,0.06);
  }
  .card.just-arrived {
    animation: slideInFade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideInFade {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .thumb {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-md);
    background: var(--surface-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-2);
    flex-shrink: 0;
    overflow: hidden;
  }
  .thumb svg { width: 30px; height: 30px; stroke-width: 1.4; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }

  .card-body { min-width: 0; }
  .card-title {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 500;
    margin: 0 0 4px;
    line-height: 1.25;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .card-desc {
    font-size: 13px;
    color: var(--ink-2);
    margin: 0 0 10px;
    line-height: 1.55;
  }
  .card-meta {
    font-size: 11.5px;
    color: var(--ink-3);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .card-meta .dot {
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: var(--ink-3);
    display: inline-block;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 100px;
    font-weight: 500;
  }
  .pill.lost { background: var(--lost-bg); color: var(--lost); }
  .pill.found { background: var(--found-bg); color: var(--found); }
  .pill.reunited {
    background: rgba(255,255,255,0.55);
    color: var(--reunited);
    font-family: var(--serif);
    font-style: italic;
    letter-spacing: 0.04em;
    text-transform: none;
    font-size: 11px;
    padding: 3px 10px;
  }
  .pill.pending-handoff {
    background: var(--handoff-bg);
    color: var(--handoff);
  }

  .card-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-end;
    min-width: 130px;
  }
  .contact {
    font-size: 11.5px;
    color: var(--ink-3);
    font-family: var(--mono);
    word-break: break-all;
    text-align: right;
  }
  .contact.revealed { color: var(--ink-2); }
  .action-btn {
    border: 1px solid var(--line-strong);
    background: var(--surface);
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink);
    white-space: nowrap;
    transition: all 0.15s ease;
  }
  .action-btn:hover { background: var(--surface-muted); }
  .action-btn.primary {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }
  .action-btn.primary:hover { opacity: 0.92; background: var(--ink); }
  .action-btn:disabled { opacity: 0.5; cursor: wait; }

  .matches {
    margin-top: 12px;
    padding: 12px 14px;
    background: var(--surface-muted);
    border-radius: var(--radius-md);
    font-size: 12px;
  }
  .matches-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .matches-title {
    font-weight: 500;
    font-size: 12px;
    color: var(--ink);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .matches-hint {
    color: var(--ink-3);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .match-item {
    font-size: 12.5px;
    color: var(--ink-2);
    padding: 7px 0;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .match-item:first-of-type { border-top: none; padding-top: 2px; }
  .match-item-title {
    font-family: var(--serif);
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
  }
  .match-view-btn {
    background: transparent;
    border: none;
    font-family: inherit;
    font-size: 11px;
    color: var(--ink-3);
    cursor: pointer;
    padding: 2px 0;
    white-space: nowrap;
  }
  .match-view-btn:hover { color: var(--ink); }

  /* ============ Empty state ============ */
  .empty {
    padding: 80px 20px;
    text-align: center;
  }
  .empty-quote {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    color: var(--ink-2);
    max-width: 420px;
    margin: 0 auto 12px;
    line-height: 1.5;
    letter-spacing: -0.005em;
  }
  .empty-sub {
    font-size: 12px;
    color: var(--ink-3);
  }

  /* ============ Modal ============ */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(28,28,27,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 28px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-modal);
    animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .modal-title {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 500;
    margin: 0 0 6px;
    line-height: 1.15;
    letter-spacing: -0.02em;
  }
  .modal-sub {
    font-size: 13px;
    color: var(--ink-2);
    margin: 0 0 22px;
    line-height: 1.55;
  }
  .seg {
    display: flex;
    background: var(--surface-muted);
    border-radius: 100px;
    padding: 3px;
    gap: 2px;
    margin-bottom: 18px;
  }
  .seg button {
    flex: 1;
    border: none;
    background: transparent;
    padding: 8px 14px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink-2);
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
  }
  .seg button.active {
    background: var(--surface);
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .field input,
  .field select,
  .field textarea {
    width: 100%;
    padding: 10px 12px;
    font-size: 13.5px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    font-family: inherit;
    color: var(--ink);
    outline: none;
    transition: border 0.15s ease;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus { border-color: var(--ink); }
  .field textarea {
    resize: vertical;
    min-height: 70px;
    line-height: 1.5;
  }
  .field-hint {
    font-size: 11px;
    color: var(--ink-3);
    margin-top: 5px;
    line-height: 1.4;
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 22px;
    gap: 10px;
  }
  .modal-hint {
    font-size: 11px;
    color: var(--ink-3);
  }
  .btn-group { display: flex; gap: 8px; }
  .btn-secondary {
    padding: 9px 16px;
    background: transparent;
    border: 1px solid var(--line-strong);
    border-radius: 100px;
    font-size: 12.5px;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink);
    font-weight: 500;
  }
  .btn-secondary:hover { background: var(--surface-muted); }
  .btn-primary {
    padding: 9px 18px;
    background: var(--ink);
    color: var(--surface);
    border: none;
    border-radius: 100px;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary:hover { opacity: 0.92; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: wait; }

  .photo-drop {
    border: 1px dashed var(--line-strong);
    border-radius: var(--radius-sm);
    padding: 16px;
    text-align: center;
    font-size: 12px;
    color: var(--ink-3);
    cursor: pointer;
    transition: all 0.15s ease;
    display: block;
  }
  .photo-drop:hover { border-color: var(--ink); color: var(--ink-2); }
  .photo-preview {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    display: block;
    margin: 0 auto;
  }

  .preview-card {
    background: var(--surface-muted);
    padding: 16px;
    border-radius: var(--radius-md);
    margin-bottom: 16px;
  }
  .preview-card-title {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .preview-card-desc {
    font-size: 12.5px;
    color: var(--ink-2);
    margin-bottom: 10px;
    line-height: 1.55;
  }
  .preview-card-meta {
    font-size: 11px;
    color: var(--ink-3);
  }

  .reveal-box {
    background: var(--surface-muted);
    padding: 20px;
    border-radius: var(--radius-md);
    margin-bottom: 16px;
    text-align: center;
  }
  .reveal-label {
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 500;
  }
  .reveal-email {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--ink);
    margin-bottom: 4px;
    word-break: break-all;
  }
  .reveal-phone {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-2);
    margin-top: 6px;
  }

  /* ============ Handoff code display ============ */
  .handoff-code-display {
    background: var(--surface-muted);
    padding: 24px 20px;
    border-radius: var(--radius-md);
    margin-bottom: 16px;
    text-align: center;
  }
  .handoff-code-label {
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .handoff-code-digits {
    font-family: var(--serif);
    font-size: 54px;
    font-weight: 500;
    letter-spacing: 0.16em;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 10px;
  }
  .handoff-code-expiry {
    font-size: 11px;

const LS_ME = 'omnicom-concierge-me';
const LS_REVEALED = 'omnicom-concierge-revealed';
const LS_MY_POSTS = 'omnicom-concierge-my-posts';

let supabase = null;

const LS_PREFS = 'omnicom-concierge-prefs';

let state = {
  items: [],
  reunionCount: 0,
  activeTab: 'all',
  filterAgency: 'all',
  filterFloor: 'all',
  search: '',
  me: null,
  revealed: {},
  myPosts: {},
  loading: true,
  syncStatus: 'syncing',
  recentArrivals: new Set(),
  showReunited: false,
  prefs: { lastFloor: null, lastAgency: null },
  leaderboard: null,
  leaderboardOpen: false
};

function loadLocal() {
  try {
    state.me = localStorage.getItem(LS_ME) || null;
    state.revealed = JSON.parse(localStorage.getItem(LS_REVEALED) || '{}');
    state.myPosts = JSON.parse(localStorage.getItem(LS_MY_POSTS) || '{}');
    const prefs = JSON.parse(localStorage.getItem(LS_PREFS) || '{}');
    state.prefs = { lastFloor: prefs.lastFloor || null, lastAgency: prefs.lastAgency || null };
  } catch(e) {}
}
function saveMe() { try { if (state.me) localStorage.setItem(LS_ME, state.me); } catch(e) {} }
function saveRevealed() { try { localStorage.setItem(LS_REVEALED, JSON.stringify(state.revealed)); } catch(e) {} }
function saveMyPosts() { try { localStorage.setItem(LS_MY_POSTS, JSON.stringify(state.myPosts)); } catch(e) {} }
function savePrefs() { try { localStorage.setItem(LS_PREFS, JSON.stringify(state.prefs)); } catch(e) {} }

/* ============ helpers ============ */
function timeAgo(ts) {
  const t = typeof ts === 'string' ? new Date(ts).getTime() : ts;
  const s = Math.floor((Date.now()-t)/1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 86400*7) return Math.floor(s/86400) + 'd ago';
  const d = new Date(t);
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
}
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function similarity(a, b) {
  if (a.kind === b.kind) return 0;
  let score = 0;
  if (a.category === b.category) score += 0.5;
  if (a.floor === b.floor) score += 0.2;
  if (Math.abs(a.floor - b.floor) === 1) score += 0.1;
  if (a.agency === b.agency) score += 0.1;
  const aw = (a.title + ' ' + a.desc).toLowerCase().split(/\W+/).filter(w => w.length > 3);
  const bw = new Set((b.title + ' ' + b.desc).toLowerCase().split(/\W+/).filter(w => w.length > 3));
  const overlap = aw.filter(w => bw.has(w)).length;
  score += Math.min(0.4, overlap * 0.15);
  return score;
}
function findMatches(item) {
  return state.items
    .filter(x => x.kind !== item.kind && x.status === 'open' && x.id !== item.id)
    .map(x => ({ item: x, score: similarity(item, x) }))
    .filter(m => m.score >= 0.55)
    .sort((a,b) => b.score - a.score)
    .slice(0, 3);
}

function visibleItems() {
  const statusRank = { pending_handoff: 0, open: 1, reunited: 2 };
  return state.items.filter(i => {
    // Tab filtering
    if (state.activeTab === 'lost' && i.kind !== 'lost') return false;
    if (state.activeTab === 'found' && i.kind !== 'found') return false;
    if (state.activeTab === 'mine') {
      const isMine = state.myPosts[i.id] === true;
      const revealed = state.revealed[i.id];
      if (!isMine && !revealed) return false;
    }
    // Hide reunited items from the main feed — they live in the collapsed strip
    if (state.activeTab !== 'mine' && i.status === 'reunited' && !state.showReunited) return false;
    if (state.filterAgency !== 'all' && i.agency !== state.filterAgency) return false;
    if (state.filterFloor !== 'all' && String(i.floor) !== state.filterFloor) return false;
    if (state.search) {
      const q = state.search.toLowerCase().trim();
      if (!q) return true;
      const hay = (i.title + ' ' + i.desc + ' ' + i.agency + ' floor ' + i.floor + ' ' + i.kind).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => {
    // Pending handoffs pin to top, then open items, then reunited at the bottom
    const sa = statusRank[a.status] ?? 3;
    const sb = statusRank[b.status] ?? 3;
    if (sa !== sb) return sa - sb;
    return new Date(b.ts).getTime() - new Date(a.ts).getTime();
  });
}

function reunitedItems() {
  return state.items
    .filter(i => i.status === 'reunited')
    .sort((a,b) => new Date(b.ts).getTime() - new Date(a.ts).getTime());
}

/* ============ Supabase I/O ============ */
function rowToItem(r) {
  return {
    id: r.id,
    kind: r.kind,
    title: r.title,
    desc: r.description,
    category: r.category,
    agency: r.agency,
    floor: Number(r.floor) || 0,
    emailMasked: r.email_masked || '',
    photo: r.photo || null,
    ts: r.created_at,
    status: r.status || 'open',
    handoffInitiatorMasked: r.handoff_initiator_masked || null,
    handoffExpiresAt: r.handoff_code_expires_at || null
  };
}

async function fetchFeed() {
  state.syncStatus = 'syncing';
  updateSyncDot();
  try {
    const { data, error } = await supabase
      .from('concierge_items_public')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) throw error;
    state.items = (data || []).map(rowToItem);
    state.reunionCount = state.items.filter(i => i.status === 'reunited').length;
    state.loading = false;
    state.syncStatus = 'idle';
    render();
  } catch(err) {
    state.syncStatus = 'error';
    state.loading = false;
    render();
    console.error(err);
  }
}

function subscribeRealtime() {
  const channel = supabase
    .channel('concierge-items')
    .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'concierge_items' },
        payload => handleRealtimeInsert(payload.new)
    )
    .on('postgres_changes',
        { event: 'UPDATE', schema: 'public', table: 'concierge_items' },
        payload => handleRealtimeUpdate(payload.new)
    )
    .subscribe(status => {
      if (status === 'SUBSCRIBED') {
        state.syncStatus = 'idle';
      } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
        state.syncStatus = 'error';
        setTimeout(() => {
          channel.unsubscribe();
          subscribeRealtime();
        }, 3000);
      }
      updateSyncDot();
    });
  return channel;
}

async function handleRealtimeInsert(row) {
  // We need the masked email, which only the view provides. Fetch just this row.
  try {
    const { data, error } = await supabase
      .from('concierge_items_public')
      .select('*')
      .eq('id', row.id)
      .single();
    if (error || !data) return;
    const item = rowToItem(data);
    if (state.items.some(x => x.id === item.id)) return;
    state.items.unshift(item);
    // Only animate if it's not one I just posted.
    if (!state.myPosts[item.id]) {
      state.recentArrivals.add(item.id);
      setTimeout(() => { state.recentArrivals.delete(item.id); }, 800);
    }
    render();
  } catch(e) { /* ignore */ }
}

async function handleRealtimeUpdate(row) {
  const existing = state.items.find(x => x.id === row.id);
  if (!existing) return;
  const wasReunited = existing.status === 'reunited';
  const nowReunited = row.status === 'reunited';
  existing.status = row.status;
  // Refresh handoff fields from the public view so we have the masked initiator.
  try {
    const { data } = await supabase
      .from('concierge_items_public')
      .select('handoff_initiator_masked, handoff_code_expires_at')
      .eq('id', row.id)
      .single();
    if (data) {
      existing.handoffInitiatorMasked = data.handoff_initiator_masked || null;
      existing.handoffExpiresAt = data.handoff_code_expires_at || null;
    }
  } catch(e) {}
  if (!wasReunited && nowReunited) {
    state.reunionCount += 1;
    bumpReunionCounter();
  }
  render();
}

function bumpReunionCounter() {
  const el = document.getElementById('reunion-count');
  if (!el) return;
  el.classList.add('bumped');
  setTimeout(() => el.classList.remove('bumped'), 400);
}

function updateSyncDot() {
  const syncDot = document.querySelector('.sync-dot');
  if (!syncDot) return;
  syncDot.className = 'sync-dot ' + (state.syncStatus === 'syncing' ? 'syncing' : state.syncStatus === 'error' ? 'error' : '');
  const label = syncDot.nextElementSibling;
  if (label) label.textContent = state.syncStatus === 'syncing' ? 'Connecting' : (state.syncStatus === 'error' ? 'Offline — will retry' : 'Live');
}

  const root = document.getElementById('app-root');
  const syncClass = state.syncStatus === 'syncing' ? 'syncing' : (state.syncStatus === 'error' ? 'error' : '');
  const syncText = state.syncStatus === 'syncing' ? 'Connecting' : (state.syncStatus === 'error' ? 'Offline — will retry' : 'Live');

  root.innerHTML = `
    <header class="mast">
      <div>
        <div class="mast-eyebrow">Building Services</div>
        <h1 class="mast-title">The Concierge</h1>
        <p class="mast-tag">A quiet service for things gone astray. Post what you've lost, or what you've found. We'll hold it with care until the two meet.</p>

function renderCard(item) {
  const matches = item.status === 'open' ? findMatches(item) : [];
  const isMine = state.myPosts[item.id] === true;
  const revealed = state.revealed[item.id];
  const isInitiator = state.me && item.handoffInitiatorMasked && isMineByMask(state.me, item.handoffInitiatorMasked) && (isMine || revealed);
  const isInvolved = isMine || revealed;

  const photoOrIcon = item.photo
    ? `<div class="thumb"><img src="${item.photo}" alt=""/></div>`
    : `<div class="thumb">${ICONS[item.category] || ICONS.other}</div>`;

  // Pill content varies by status.
  let pillClass, pillText, pillGlyph = '';
  if (item.status === 'reunited') { pillClass = 'reunited'; pillText = 'Reunited'; }
  else if (item.status === 'pending_handoff') { pillClass = 'pending-handoff'; pillText = 'Handoff in progress'; }
  else if (item.kind === 'lost') { pillClass = 'lost'; pillText = 'lost'; pillGlyph = '<span aria-hidden="true" style="margin-right:4px;">↓</span>'; }
  else { pillClass = 'found'; pillText = 'found'; pillGlyph = '<span aria-hidden="true" style="margin-right:4px;">↑</span>'; }

  // Contact column.
  let contact;
  if (item.status === 'reunited') {
    contact = '<span class="contact" style="opacity:0.6;">Closed</span>';
  } else if (revealed) {
    const phone = revealed.phone ? '<br/>' + escapeHtml(revealed.phone) : '';
    contact = `<span class="contact revealed">${escapeHtml(revealed.email)}${phone}</span>`;
  } else if (isMine && state.me) {
    contact = `<span class="contact revealed">${escapeHtml(state.me)}</span>`;
  } else {
    contact = `<span class="contact">${escapeHtml(item.emailMasked)}</span>`;
  }

  // Action button logic.
  let actionBtn = '';
  if (item.status === 'open') {
    if (isInvolved) {
      actionBtn = `<button class="action-btn" data-action="start-handoff" data-id="${item.id}">Start handoff →</button>`;
    } else {
      actionBtn = `<button class="action-btn primary" data-action="claim" data-id="${item.id}">${item.kind === 'found' ? "It's mine" : 'I found it'}</button>`;
    }
  } else if (item.status === 'pending_handoff') {
    if (isInitiator) {
      actionBtn = `<button class="action-btn" data-action="show-handoff" data-id="${item.id}">Show code</button>`;
    } else if (isInvolved) {
      actionBtn = `<button class="action-btn primary" data-action="enter-handoff" data-id="${item.id}">Enter code</button>`;
    }
  }

  let matchesHtml = '';
  if (matches.length) {
    matchesHtml = `
      <div class="matches">
        <div class="matches-head">
          <span class="matches-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 12l3 3 5-6"/><circle cx="12" cy="12" r="9"/></svg>
            ${matches.length} possible ${matches.length === 1 ? 'match' : 'matches'}
          </span>
          <span class="matches-hint">Tap to view</span>
        </div>
        ${matches.map(m => `
          <div class="match-item">
            <span class="match-item-title">${escapeHtml(m.item.title)}</span>
            <button class="match-view-btn" data-action="scroll-to" data-id="${m.item.id}">View →</button>
          </div>
        `).join('')}
      </div>`;
  }

  const arrivedClass = state.recentArrivals.has(item.id) ? 'just-arrived' : '';
  const statusClass = item.status === 'reunited' ? 'reunited' : (item.status === 'pending_handoff' ? 'pending-handoff' : '');

  return `
    <article class="card ${statusClass} ${arrivedClass}" data-id="${item.id}">
      ${photoOrIcon}
      <div class="card-body">
        <h3 class="card-title">${escapeHtml(item.title)}</h3>
        <p class="card-desc">${escapeHtml(item.desc)}</p>
        <div class="card-meta">
          <span class="pill ${pillClass}">${pillGlyph}${pillText}</span>
          <span>Floor ${item.floor}</span><span class="dot"></span>
          <span>${escapeHtml(item.agency)}</span><span class="dot"></span>
          <span>${timeAgo(item.ts)}</span>
        </div>
        ${matchesHtml}
      </div>
      <div class="card-actions">
        ${contact}
        ${actionBtn}
      </div>
    </article>
  `;
}

/* Compare a full email against a masked initiator string to detect ownership. */
function isMineByMask(myEmail, mask) {
  if (!myEmail || !mask) return false;
  const [myUser, myDomain] = myEmail.toLowerCase().split('@');
  const [maskUser, maskDomain] = mask.toLowerCase().split('@');
  if (myDomain !== maskDomain) return false;
  // Mask format: X•••Y or XX•••Y or X•••
  const first = maskUser.replace(/•/g,'')[0] || '';
  const lastPart = maskUser.split('•').pop();
  const last = lastPart && lastPart.length ? lastPart[lastPart.length-1] : '';
  if (myUser[0] !== first) return false;
  if (last && myUser[myUser.length-1] !== last) return false;
  return true;
}

function render() {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return;

  const rCount = document.getElementById('reunion-count');
  if (rCount) rCount.textContent = state.reunionCount;

  updateSyncDot();

  const banner = document.getElementById('me-banner-slot');
  if (banner) {
    if (state.me) {
      banner.innerHTML = `<div class="me-banner"><span>Posting as <b>${escapeHtml(state.me)}</b></span><button class="me-banner-link" id="change-me">Change</button></div>`;
      const cm = document.getElementById('change-me');
      if (cm) cm.addEventListener('click', () => {
        state.me = null;
        try { localStorage.removeItem(LS_ME); } catch(e) {}
        render();
        toast('Identity cleared');
      });
    } else {
      banner.innerHTML = '';
    }
  }

  const feed = document.getElementById('feed');
  if (!feed) return;
  if (state.loading) {
    feed.innerHTML = '<div class="loading">Fetching the day\'s strays…</div>';
    return;
  }
  const items = visibleItems();
  if (items.length === 0) {
    feed.innerHTML = `<div class="empty"><div class="empty-quote">${emptyStateMessage()}</div><div class="empty-sub">${emptyStateSub()}</div></div>`;
  } else {
    feed.innerHTML = items.map(renderCard).join('');
  }

  renderReunitedStrip();
}

function emptyStateMessage() {
  if (state.search) return 'Nothing matched. Try a different word, or a different floor.';
  if (state.activeTab === 'mine') return 'You haven\'t posted or claimed anything here yet.';
  if (state.activeTab === 'lost') return 'Nothing lost just now. A small mercy.';
  if (state.activeTab === 'found') return 'Nothing found, nothing waiting to be claimed.';
  if (state.filterAgency !== 'all' || state.filterFloor !== 'all') {
    return 'No items match that filter.';
  }
  return 'Nothing here yet. Which is either a very good day in the building, or a very quiet one.';
}

function emptyStateSub() {
  if (state.activeTab === 'mine') return 'Once you post or claim, your items appear here.';
  if (state.filterAgency !== 'all' || state.filterFloor !== 'all') return 'Try clearing a filter above.';
  if (state.search) return '';
  return 'Be the first to post — click New post above.';
}

function renderReunitedStrip() {
  const slot = document.getElementById('reunited-strip-slot');
  if (!slot) return;
  // Don't show strip in the Mine tab (reunited items already appear inline there)
  if (state.activeTab === 'mine') { slot.innerHTML = ''; return; }

  const reunited = reunitedItems();
  if (reunited.length === 0) { slot.innerHTML = ''; return; }

  const expandedClass = state.showReunited ? 'expanded' : '';
  const content = state.showReunited
    ? `<div class="reunited-strip-content">${reunited.map(renderCard).join('')}</div>`
    : '';

  slot.innerHTML = `
    <div class="reunited-strip">
      <button class="reunited-strip-toggle ${expandedClass}" id="reunited-toggle">
        <span class="count">${reunited.length}</span>
        <span class="label">reunited item${reunited.length === 1 ? '' : 's'}</span>
        <span class="chev">▾</span>
      </button>
      ${content}
    </div>
  `;
  const toggle = document.getElementById('reunited-toggle');
  if (toggle) toggle.addEventListener('click', () => {
    state.showReunited = !state.showReunited;
    render();
  });
}

function bindShellEvents() {
  document.querySelectorAll('.tab').forEach(el => el.addEventListener('click', () => {
    state.activeTab = el.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === el));
    render();
  }));
  document.querySelectorAll('.chip').forEach(el => el.addEventListener('click', () => {
    const f = el.dataset.filter;
    if (f === 'agency') state.filterAgency = el.dataset.value;
    else if (f === 'floor') state.filterFloor = el.dataset.value;
    document.querySelectorAll(`.chip[data-filter="${f}"]`).forEach(c => c.classList.toggle('active', c === el));
    render();
  }));
  const search = document.getElementById('search');
  if (search) search.addEventListener('input', (e) => {
    state.search = e.target.value;
    render();
  });
  const postBtn = document.getElementById('post-btn');
  if (postBtn) postBtn.addEventListener('click', () => openPostModal());

  const lbBtn = document.getElementById('leaderboard-btn');
  if (lbBtn) lbBtn.addEventListener('click', () => openLeaderboardModal());

  const feed = document.getElementById('feed');
  if (feed) feed.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    if (btn.dataset.action === 'claim') openClaimModal(id);
    else if (btn.dataset.action === 'start-handoff') startHandoff(id);
    else if (btn.dataset.action === 'show-handoff') showExistingHandoff(id);
    else if (btn.dataset.action === 'enter-handoff') openEnterHandoffModal(id);
    else if (btn.dataset.action === 'scroll-to') {
      const card = document.querySelector(`.card[data-id="${id}"]`);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.classList.add('highlighted');
        setTimeout(() => card.classList.remove('highlighted'), 1800);
      }
    }
  });
}

/* ============ toast & modal ============ */
function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast visible' + (isError ? ' error' : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.className = 'toast', 2800);
}
function openModal(html) {
  const root = document.getElementById('modal-root');
  root.innerHTML = '<div class="modal-bg" id="modal-bg">' + html + '</div>';
  document.getElementById('modal-bg').addEventListener('click', (e) => {
    if (e.target.id === 'modal-bg') closeModal();
  });
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

/* ============ post modal ============ */
function openPostModal(prefillKind) {
  let currentKind = prefillKind || 'lost';
  const rememberedEmail = state.me || '';
  openModal(`
    <div class="modal" role="dialog">
      <h2 class="modal-title">Tell us what's happened</h2>
      <p class="modal-sub">A clear description helps the other half of this puzzle find you faster.</p>
      <div class="seg" id="kind-seg">
        <button type="button" data-kind="lost" class="${currentKind==='lost'?'active':''}">I've lost something</button>
        <button type="button" data-kind="found" class="${currentKind==='found'?'active':''}">I've found something</button>
      </div>
      <div class="field">
        <label>Item</label>
        <input type="text" id="f-title" placeholder="e.g. Black umbrella, wooden handle" maxlength="80"/>
      </div>
      <div class="field">
        <label>A line or two about it</label>
        <textarea id="f-desc" placeholder="Where, when, any distinguishing marks" maxlength="240"></textarea>
      </div>
      <div class="row2">
        <div class="field">
          <label id="f-floor-label">Floor</label>
          <select id="f-floor">${[1,2,3,4,5,6,7,8].map(n => `<option value="${n}"${state.prefs.lastFloor===n?' selected':''}>${n}</option>`).join('')}</select>
        </div>
        <div class="field">
          <label id="f-agency-label">Agency office</label>
          <select id="f-agency">${AGENCIES.map(a => `<option value="${a}"${state.prefs.lastAgency===a?' selected':''}>${a}</option>`).join('')}</select>
        </div>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="f-cat">${CATEGORIES.map(c => `<option value="${c.id}">${c.label}</option>`).join('')}</select>
      </div>
      <div class="field">
        <label>Your work email</label>
        <input type="email" id="f-email" placeholder="enter your email" value="${escapeHtml(rememberedEmail)}"/>
        <div class="field-hint">Hidden from others until someone claims the item.</div>
      </div>
      <div class="field">
        <label>Phone (optional)</label>
        <input type="tel" id="f-phone" placeholder="Share only if you prefer this over email"/>
      </div>
      <div class="field">
        <label>Photo (optional)</label>
        <label for="f-photo" class="photo-drop" id="f-photo-drop">Tap to attach a photo</label>
        <input type="file" id="f-photo" accept="image/*" style="display:none"/>
      </div>
      <div class="modal-actions">
        <div class="modal-hint">Posts stay until marked reunited.</div>
        <div class="btn-group">
          <button class="btn-secondary" id="f-cancel">Cancel</button>
          <button class="btn-primary" id="f-submit">Post</button>
        </div>
      </div>
    </div>
  `);

  let photoData = null;
  const modal = document.querySelector('.modal');
  setTimeout(() => { const el = document.getElementById('f-title'); if (el) el.focus(); }, 50);

  function updateContextLabels(kind) {
    const verb = kind === 'found' ? 'found' : 'lost';
    const prep = kind === 'found' ? 'on' : 'on';
    const floorEl = document.getElementById('f-floor-label');
    const agencyEl = document.getElementById('f-agency-label');
    if (floorEl) floorEl.textContent = `Floor it was ${verb} ${prep}`;
    if (agencyEl) agencyEl.textContent = `Agency office it was ${verb} in`;
    const titleEl = document.getElementById('f-title');
    if (titleEl) {
      titleEl.placeholder = kind === 'found'
        ? 'e.g. Set of keys with a silver keyring'
        : 'e.g. Black umbrella, wooden handle';
    }
    const descEl = document.getElementById('f-desc');
    if (descEl) {
      descEl.placeholder = kind === 'found'
        ? 'Where you found it, any distinguishing marks'
        : 'Where you last had it, any distinguishing marks';
    }
  }
  updateContextLabels(currentKind);

  modal.querySelectorAll('#kind-seg button').forEach(b => b.addEventListener('click', () => {
    currentKind = b.dataset.kind;
    modal.querySelectorAll('#kind-seg button').forEach(x => x.classList.toggle('active', x === b));
    updateContextLabels(currentKind);
  }));

  document.getElementById('f-photo').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 400;
        const ratio = Math.min(max / img.width, max / img.height, 1);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        photoData = canvas.toDataURL('image/jpeg', 0.65);
        document.getElementById('f-photo-drop').innerHTML = `<img src="${photoData}" class="photo-preview" alt=""/>`;
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('f-cancel').addEventListener('click', closeModal);
  document.getElementById('f-submit').addEventListener('click', async () => {
    const btn = document.getElementById('f-submit');
    const title = document.getElementById('f-title').value.trim();
    const desc = document.getElementById('f-desc').value.trim();
    const email = document.getElementById('f-email').value.trim().toLowerCase();
    const floor = parseInt(document.getElementById('f-floor').value);
    const agency = document.getElementById('f-agency').value;
    const cat = document.getElementById('f-cat').value;
    const phone = document.getElementById('f-phone').value.trim();
    if (!title) { toast('Please add an item name', true); document.getElementById('f-title').focus(); return; }
    if (!desc) { toast('Please add a short description', true); document.getElementById('f-desc').focus(); return; }
    if (!email || !email.includes('@')) { toast('Please add your work email', true); document.getElementById('f-email').focus(); return; }
    const domain = email.split('@')[1];
    if (!VALID_DOMAINS.includes(domain)) { toast('Please use your @omc.com email', true); document.getElementById('f-email').focus(); return; }

    btn.disabled = true;
    btn.textContent = 'Posting…';
    const id = 'i' + Date.now() + Math.random().toString(36).slice(2, 6);
    try {
      const { error } = await supabase.from('concierge_items').insert({
        id, kind: currentKind, title, description: desc, category: cat,
        agency, floor, email, phone, photo: photoData, status: 'open'
      });
      if (error) throw error;
      state.me = email;
      state.myPosts[id] = true;
      state.prefs.lastFloor = floor;
      state.prefs.lastAgency = agency;
      saveMe();
      saveMyPosts();
      savePrefs();
      closeModal();
      toast('Posted. We\'ll hold it with care.');
      // Realtime will deliver the new row, but be defensive.
      setTimeout(() => {
        const card = document.querySelector(`.card[data-id="${id}"]`);
        if (card) {
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          card.classList.add('highlighted');
          setTimeout(() => card.classList.remove('highlighted'), 1800);
        }
      }, 500);
    } catch(err) {
      btn.disabled = false;
      btn.textContent = 'Post';
      toast(err.message || 'Could not post — check connection', true);
      console.error(err);
    }
  });
}

/* ============ claim modal ============ */
function openClaimModal(itemId) {
  const item = state.items.find(x => x.id === itemId);
  if (!item) return;
  const isFound = item.kind === 'found';
  const knownEmail = state.me && VALID_DOMAINS.includes((state.me.split('@')[1] || '')) ? state.me : '';

  const emailField = knownEmail
    ? `<div class="me-banner" style="margin-bottom:16px;"><span>Revealing as <b>${escapeHtml(knownEmail)}</b></span><button class="me-banner-link" id="c-change">Change</button></div>`
    : `<div class="field">
         <label>Your work email</label>
         <input type="email" id="c-email" placeholder="you@omc.com" value=""/>
         <div class="field-hint">Verifies you're in the building. Logged with the reveal.</div>
       </div>`;

  openModal(`
    <div class="modal" role="dialog">
      <h2 class="modal-title">${isFound ? 'Is this yours?' : 'Have you found this?'}</h2>
      <p class="modal-sub">${isFound ? 'Claiming reveals the finder\'s contact to you so you can arrange to pick it up.' : 'Revealing reveals the owner\'s contact to you so you can return it.'}</p>
      <div class="preview-card">
        <div class="preview-card-title">${escapeHtml(item.title)}</div>
        <div class="preview-card-desc">${escapeHtml(item.desc)}</div>
        <div class="preview-card-meta">Floor ${item.floor} · ${escapeHtml(item.agency)} · ${timeAgo(item.ts)}</div>
      </div>
      ${emailField}
      <div class="modal-actions">
        <div class="modal-hint"></div>
        <div class="btn-group">
          <button class="btn-secondary" id="c-cancel">Cancel</button>
          <button class="btn-primary" id="c-submit">Reveal contact</button>
        </div>
      </div>
    </div>
  `);
  if (!knownEmail) setTimeout(() => { const el = document.getElementById('c-email'); if (el) el.focus(); }, 50);

  const changeBtn = document.getElementById('c-change');
  if (changeBtn) changeBtn.addEventListener('click', () => {
    state.me = null;
    try { localStorage.removeItem(LS_ME); } catch(e) {}
    closeModal();
    openClaimModal(itemId);
  });

  document.getElementById('c-cancel').addEventListener('click', closeModal);
  document.getElementById('c-submit').addEventListener('click', async () => {
    const btn = document.getElementById('c-submit');
    const inputEl = document.getElementById('c-email');
    const email = (inputEl ? inputEl.value : knownEmail).trim().toLowerCase();
    if (!email || !email.includes('@')) { toast('Please add your email', true); return; }
    if (!VALID_DOMAINS.includes(email.split('@')[1])) { toast('Please use your @omc.com email', true); return; }
    btn.disabled = true;
    btn.textContent = 'Revealing…';
    try {
      const { data, error } = await supabase.rpc('reveal_contact', {
        p_item_id: item.id,
        p_claimer_email: email
      });
      if (error) throw error;
      if (!data || !data.length) throw new Error('Item not found');
      const revealed = { email: data[0].email, phone: data[0].phone || '' };
      state.me = email;
      state.revealed[item.id] = revealed;
      saveMe();
      saveRevealed();
      showRevealModal(item, revealed);
      render();
    } catch(err) {
      btn.disabled = false;
      btn.textContent = 'Reveal contact';
      toast(err.message || 'Could not reveal — try again', true);
    }
  });
}

function showRevealModal(item, reveal) {
  const phoneLine = reveal.phone ? `<div class="reveal-phone">${escapeHtml(reveal.phone)}</div>` : '';
  openModal(`
    <div class="modal" role="dialog">
      <h2 class="modal-title">Contact revealed</h2>
      <p class="modal-sub">Reach out directly. Once the item changes hands, either of you can mark it reunited.</p>
      <div class="reveal-box">
        <div class="reveal-label">${item.kind === 'found' ? 'Found by' : 'Lost by'}</div>
        <div class="reveal-email">${escapeHtml(reveal.email)}</div>
        ${phoneLine}
      </div>
      <div class="modal-actions">
        <div class="modal-hint"></div>
        <div class="btn-group">
          <button class="btn-secondary" id="r-copy">Copy email</button>
          <button class="btn-primary" id="r-done">Got it</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('r-done').addEventListener('click', closeModal);
  document.getElementById('r-copy').addEventListener('click', () => {
    try {
      navigator.clipboard.writeText(reveal.email);
      toast('Email copied');
    } catch(e) { toast('Could not copy — select manually', true); }
  });
}

/* ============ handoff flow ============ */

async function startHandoff(itemId) {
  if (!state.me) { toast('Please post or claim first to identify yourself', true); return; }
  try {
    const { data, error } = await supabase.rpc('start_handoff', {
      p_item_id: itemId,
      p_initiator_email: state.me
    });
    if (error) throw error;
    if (!data || !data.length) throw new Error('Could not start handoff');
    showHandoffCodeModal(itemId, data[0].out_code, data[0].out_expires_at);
  } catch(err) {
    toast(err.message || 'Could not start handoff', true);
  }
}

async function showExistingHandoff(itemId) {
  // The user is the initiator and wants to see the code again.
  // The code itself isn't in the public view, so we can't re-fetch it.
  // Instead, the initiator can only restart the handoff.
  const item = state.items.find(x => x.id === itemId);
  if (!item) return;
  openModal(`
    <div class="modal" role="dialog">
      <h2 class="modal-title">Handoff in progress</h2>
      <p class="modal-sub">You started a handoff for this item. If you've lost the code, restart the handoff to get a new one.</p>
      <div class="preview-card">
        <div class="preview-card-title">${escapeHtml(item.title)}</div>
        <div class="preview-card-meta">Floor ${item.floor} · ${escapeHtml(item.agency)}</div>
      </div>
      <div class="modal-actions">
        <div class="modal-hint"></div>
        <div class="btn-group">
          <button class="btn-secondary" id="h-cancel">Cancel handoff</button>
          <button class="btn-primary" id="h-restart">New code</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('h-cancel').addEventListener('click', async () => {
    try {
      await supabase.rpc('cancel_handoff', { p_item_id: itemId, p_initiator_email: state.me });
      closeModal();
      toast('Handoff cancelled');
    } catch(e) { toast('Could not cancel', true); }
  });
  document.getElementById('h-restart').addEventListener('click', async () => {
    closeModal();
    startHandoff(itemId);
  });
}

function showHandoffCodeModal(itemId, code, expiresAt) {
  const expiryMs = new Date(expiresAt).getTime();
  const mins = Math.max(0, Math.round((expiryMs - Date.now()) / 60000));
  openModal(`
    <div class="modal" role="dialog">
      <h2 class="modal-title">Almost there</h2>
      <p class="modal-sub">Share this code with the other party. They enter it on their screen to confirm the handoff.</p>
      <div class="handoff-code-display">
        <div class="handoff-code-label">Handoff code</div>
        <div class="handoff-code-digits">${escapeHtml(code.split('').join(' '))}</div>
        <div class="handoff-code-expiry" id="h-expiry">Expires in ${mins} min</div>
      </div>
      <div class="handoff-waiting"><span class="pulse"></span><span>Waiting for the other party to enter the code…</span></div>
      <div class="modal-actions">
        <div class="modal-hint">Close this — they can find the item and enter the code anytime.</div>
        <div class="btn-group">
          <button class="btn-secondary" id="h-cancel">Cancel handoff</button>
          <button class="btn-primary" id="h-done">Done</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('h-done').addEventListener('click', closeModal);
  document.getElementById('h-cancel').addEventListener('click', async () => {
    try {
      await supabase.rpc('cancel_handoff', { p_item_id: itemId, p_initiator_email: state.me });
      closeModal();
      toast('Handoff cancelled');
    } catch(e) { toast('Could not cancel', true); }
  });
  // Update the expiry countdown every 30s.
  const countdown = setInterval(() => {
    const el = document.getElementById('h-expiry');
    if (!el) { clearInterval(countdown); return; }
    const remaining = Math.max(0, Math.round((expiryMs - Date.now()) / 60000));
    if (remaining <= 0) {
      el.textContent = 'Code expired';
      clearInterval(countdown);
    } else {
      el.textContent = `Expires in ${remaining} min`;
    }
  }, 30000);
}

function openEnterHandoffModal(itemId) {
  const item = state.items.find(x => x.id === itemId);
  if (!item) return;
  openModal(`
    <div class="modal" role="dialog">
      <h2 class="modal-title">Enter handoff code</h2>
      <p class="modal-sub">The other party is showing a 4-digit code on their screen. Enter it below.</p>
      <div class="preview-card">
        <div class="preview-card-title">${escapeHtml(item.title)}</div>
        <div class="preview-card-meta">Floor ${item.floor} · ${escapeHtml(item.agency)}</div>
      </div>
      <div class="handoff-input-row" id="h-inputs">
        <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" data-idx="0" autocomplete="off"/>
        <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" data-idx="1" autocomplete="off"/>
        <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" data-idx="2" autocomplete="off"/>
        <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" data-idx="3" autocomplete="off"/>
      </div>
      <div id="h-error" style="text-align:center;font-size:12px;color:var(--lost);min-height:18px;margin-top:4px;"></div>
      <div class="modal-actions">
        <div class="modal-hint"></div>
        <div class="btn-group">
          <button class="btn-secondary" id="h-cancel-enter">Cancel</button>
          <button class="btn-primary" id="h-submit-code" disabled>Confirm</button>
        </div>
      </div>
    </div>
  `);

  const inputs = [...document.querySelectorAll('#h-inputs input')];
  const submitBtn = document.getElementById('h-submit-code');
  const errorEl = document.getElementById('h-error');

  function getCode() { return inputs.map(i => i.value).join(''); }
  function updateSubmit() { submitBtn.disabled = getCode().length !== 4; }

  inputs.forEach((inp, idx) => {
    inp.addEventListener('input', (e) => {
      inp.value = inp.value.replace(/[^0-9]/g, '');
      errorEl.textContent = '';
      inputs.forEach(i => i.classList.remove('error'));
      if (inp.value && idx < inputs.length - 1) inputs[idx + 1].focus();
      updateSubmit();
      if (getCode().length === 4) submitCode();
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !inp.value && idx > 0) {
        inputs[idx - 1].focus();
        inputs[idx - 1].value = '';
        updateSubmit();
      }
    });
    inp.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = (e.clipboardData.getData('text') || '').replace(/[^0-9]/g, '').slice(0, 4);
      pasted.split('').forEach((ch, i) => { if (inputs[i]) inputs[i].value = ch; });
      updateSubmit();
      if (pasted.length === 4) submitCode();
    });
  });
  setTimeout(() => inputs[0].focus(), 60);

  async function submitCode() {
    const code = getCode();
    if (code.length !== 4) return;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Confirming…';
    try {
      const { data, error } = await supabase.rpc('confirm_handoff', {
        p_item_id: itemId,
        p_confirmer_email: state.me,
        p_code: code
      });
      if (error) throw error;
      if (!data || !data.length || !data[0].out_ok) {
        const msg = (data && data.length) ? data[0].out_message : 'Invalid code';
        inputs.forEach(i => i.classList.add('error'));
        errorEl.textContent = msg;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Confirm';
        setTimeout(() => {
          inputs.forEach(i => { i.classList.remove('error'); i.value = ''; });
          inputs[0].focus();
          updateSubmit();
        }, 1200);
        return;
      }
      closeModal();
      toast('Reunited · one less orphan in the building');
      fetchLeaderboard();
    } catch(err) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Confirm';
      errorEl.textContent = err.message || 'Something went wrong';
    }
  }

  document.getElementById('h-cancel-enter').addEventListener('click', closeModal);
  submitBtn.addEventListener('click', submitCode);
}

/* ============ leaderboard ============ */

async function fetchLeaderboard() {
  try {
    const { data, error } = await supabase
      .from('concierge_leaderboard')
      .select('*')
      .order('reunion_count', { ascending: false });
    if (error) throw error;
    state.leaderboard = data || [];
  } catch(e) {
    state.leaderboard = [];
  }
}

async function openLeaderboardModal() {
  // Show modal immediately with a loading placeholder, fetch fresh data.
  openModal(`
    <div class="modal" role="dialog">
      <h2 class="modal-title">Good Samaritans</h2>
      <p class="modal-sub">Reunions credited by agency — every time a found item is returned to its owner, the agency that posted the find gets a point.</p>
      <div class="leaderboard-box" id="lb-content">
        <div class="loading" style="padding:40px 0;">Loading…</div>
      </div>
      <p class="lb-note">We credit the agency, not the individual. Quiet helpfulness, not individual scorekeeping.</p>
      <div class="modal-actions">
        <div class="modal-hint"></div>
        <div class="btn-group">
          <button class="btn-primary" id="lb-done">Done</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('lb-done').addEventListener('click', closeModal);

  await fetchLeaderboard();
  const content = document.getElementById('lb-content');
  if (!content) return; // modal closed while loading
  renderLeaderboardContent(content);
}

function renderLeaderboardContent(container) {
  const rows = state.leaderboard || [];
  // Merge with AGENCIES so agencies with zero reunions still show up as "— no reunions yet".
  const byAgency = {};
  rows.forEach(r => { byAgency[r.agency] = r; });
  const merged = AGENCIES.map(a => byAgency[a] || { agency: a, reunion_count: 0, last_reunion_at: null });
  merged.sort((a,b) => b.reunion_count - a.reunion_count);

  if (merged.every(r => r.reunion_count === 0)) {
    container.innerHTML = `<div class="lb-empty">No reunions yet. Be the first to help return something.</div>`;
    return;
  }

  container.innerHTML = merged.map((r, idx) => {
    const rank = idx + 1;
    const firstClass = (rank === 1 && r.reunion_count > 0) ? 'first' : '';
    const last = r.last_reunion_at
      ? `Last reunion ${timeAgo(r.last_reunion_at)}`
      : 'No reunions yet';
    return `
      <div class="lb-row ${firstClass}">
        <div class="lb-rank">${rank}</div>
        <div>
          <div class="lb-agency">${escapeHtml(r.agency)}</div>
          <div class="lb-agency-sub">${last}</div>
        </div>
        <div class="lb-count">
          <div class="lb-count-num">${r.reunion_count}</div>
          <div class="lb-count-lbl">${r.reunion_count === 1 ? 'reunion' : 'reunions'}</div>
        </div>
      </div>
    `;
  }).join('');
}

/* ============ keyboard ============ */
document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea, select')) {
    if (e.key === 'Escape') e.target.blur();
    return;
  }
  if (e.key === '/') { e.preventDefault(); const s = document.getElementById('search'); if (s) s.focus(); }
  else if (e.key === 'n' || e.key === 'N') { e.preventDefault(); if (SUPABASE_URL) openPostModal(); }
  else if (e.key === 'Escape') closeModal();
});

/* ============ boot ============ */
loadLocal();
if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
  renderSetupScreen();
} else if (!window.supabase || !window.supabase.createClient) {
  // The Supabase CDN script didn't load — show a helpful message instead of a blank page.
  document.getElementById('app-root').innerHTML = `
    <div class="setup">
      <div style="font-family:var(--serif);font-style:italic;font-size:13px;color:var(--ink-3);margin-bottom:6px;">Building Services</div>
      <h2>Connection blocked</h2>
      <p>The Concierge couldn't reach the Supabase client library at <code>cdn.jsdelivr.net</code>. This usually means a network firewall, ad-blocker, or browser extension is interfering.</p>
      <p>Try: (1) disabling any ad-blocker for this page, (2) opening in a different browser, or (3) asking IT to whitelist <code>cdn.jsdelivr.net</code> and <code>*.supabase.co</code>.</p>
    </div>
  `;
} else {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  renderShell();
  fetchFeed();
  fetchLeaderboard();
  subscribeRealtime();
}

})(); // end IIFE
</script>
</body>
