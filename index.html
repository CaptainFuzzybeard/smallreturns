        <button class="p2-btn-text" id="h-cancel-enter">Cancel</button>
        <button class="p2-btn-primary" id="h-submit-code" disabled>Confirm →</button>
      </div>
    </div>
  `);

  const inputs = [...document.querySelectorAll('#h-inputs input')];
  const submitBtn = document.getElementById('h-submit-code');
  const errorEl = document.getElementById('h-error');

  function getCode() { return inputs.map(i => i.value).join(''); }
  function updateSubmit() {
    submitBtn.disabled = getCode().length !== 4;
    inputs.forEach(i => { if (i.value) i.classList.add('filled'); else i.classList.remove('filled'); });
  }

  inputs.forEach((inp, idx) => {
    inp.addEventListener('input', (e) => {
      inp.value = inp.value.replace(/[^0-9]/g, '');
      errorEl.textContent = '';
      inputs.forEach(i => i.classList.remove('error'));
      if (inp.value && idx < inputs.length - 1) inputs[idx + 1].focus();
      updateSubmit();
      if (getCode().length === 4) submitCode();
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !inp.value && idx > 0) {
        inputs[idx - 1].focus();
        inputs[idx - 1].value = '';
        updateSubmit();
      }
    });
    inp.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = (e.clipboardData.getData('text') || '').replace(/[^0-9]/g, '').slice(0, 4);
      pasted.split('').forEach((ch, i) => { if (inputs[i]) inputs[i].value = ch; });
      updateSubmit();
      if (pasted.length === 4) submitCode();
    });
  });
  setTimeout(() => inputs[0].focus(), 60);

  async function submitCode() {
    const code = getCode();
    if (code.length !== 4) return;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Confirming\u2026';
    try {
      const { data, error } = await supabase.rpc('confirm_handoff', {
        p_item_id: itemId,
        p_confirmer_email: state.me,
        p_code: code
      });
      if (error) throw error;
      if (!data || !data.length || !data[0].out_ok) {
        const msg = (data && data.length) ? data[0].out_message : 'Invalid code';
        inputs.forEach(i => i.classList.add('error'));
        errorEl.textContent = msg;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Confirm \u2192';
        setTimeout(() => {
          inputs.forEach(i => { i.classList.remove('error'); i.value = ''; i.classList.remove('filled'); });
          inputs[0].focus();
          updateSubmit();
        }, 1200);
        return;
      }
      closeModal();
      toast('Reunited. Nice work.');
      // Optimistic local update: mark the item as reunited so it vanishes
      // from the main feed, tab counts refresh, and the strip picks it up.
      // Realtime UPDATE will eventually confirm this from the server.
      const _localItem = state.items.find(x => x.id === itemId);
      if (_localItem) {
        _localItem.status = 'reunited';
        _localItem.updatedAt = new Date().toISOString();
        state.reunionCount += 1;
        bumpReunionCounter();
      }
      render();
      fetchLeaderboard();
    } catch(err) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Confirm \u2192';
      errorEl.textContent = err.message || 'Something went wrong';
    }
  }

  document.getElementById('h-cancel-enter').addEventListener('click', closeModal);
  submitBtn.addEventListener('click', submitCode);
}

/* Short, editorial relative-time formatter for the returns ticker.
   Output is always uppercase and slightly more literary than timeAgo(). */
function timeAgoEditorial(ts) {
  if (!ts) return '';
  const t = typeof ts === 'string' ? new Date(ts).getTime() : ts;
  const now = Date.now();
  const s = Math.floor((now - t) / 1000);
  if (s < 60) return 'JUST NOW';
  if (s < 3600) {
    const m = Math.floor(s / 60);
    return m === 1 ? '1 MIN AGO' : m + ' MINS AGO';
  }
  if (s < 86400) {
    const h = Math.floor(s / 3600);
    return h === 1 ? '1 HR AGO' : h + ' HRS AGO';
  }
  if (s < 86400 * 2) return 'YESTERDAY';
  if (s < 86400 * 7) return Math.floor(s / 86400) + ' DAYS AGO';
  if (s < 86400 * 14) return 'LAST WEEK';
  if (s < 86400 * 30) return Math.floor(s / (86400 * 7)) + ' WEEKS AGO';
  const d = new Date(t);
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }).toUpperCase();
}

/* Derive ticker + per-agency counts from state.items. Zero fetches. */
function deriveReturnsData() {
  const reunited = (state.items || []).filter(i => i.status === 'reunited');
  const now = Date.now();
  const weekAgo = now - 86400 * 7 * 1000;

  // Per-agency counts
  const counts = {};
  AGENCIES.forEach(a => { counts[a] = { agency: a, total: 0, thisWeek: 0 }; });
  reunited.forEach(item => {
    if (!counts[item.agency]) counts[item.agency] = { agency: item.agency, total: 0, thisWeek: 0 };
    counts[item.agency].total += 1;
    const t = item.updatedAt ? new Date(item.updatedAt).getTime() : new Date(item.ts).getTime();
    if (t >= weekAgo) counts[item.agency].thisWeek += 1;
  });
  const agencies = Object.values(counts)
    .sort((a, b) => b.total - a.total || a.agency.localeCompare(b.agency));

  // Ticker: most recent 5 reunited items
  const ticker = reunited
    .slice()
    .sort((a, b) => {
      const ta = new Date(a.updatedAt || a.ts).getTime();
      const tb = new Date(b.updatedAt || b.ts).getTime();
      return tb - ta;
    })
    .slice(0, 5);

  return {
    total: reunited.length,
    ticker,
    agencies
  };
}

  if (data.total === 0) {
    openModal(`
      <div class="modal" role="dialog">
        <div class="lb2-label">Returned to date</div>
        <div class="lb2-total">0</div>
        <div class="lb2-sub">Nothing yet.</div>
        <div class="lb2-empty">
          <div class="lb2-empty-headline">A quiet <em>start</em>.</div>
          <div class="lb2-empty-body">When someone returns a lost thing, this is where it will show up.</div>
        </div>
        <div class="lb2-done-row">
          <button class="lb2-done-btn" id="lb-done">Done</button>
        </div>
      </div>
    `);
    document.getElementById('lb-done').addEventListener('click', closeModal);
    return;
  }

  const tickerHtml = data.ticker.map(item => {
    const title = escapeHtml(item.title || '');
    const when = timeAgoEditorial(item.updatedAt || item.ts);
    return `
      <li class="lb2-ticker-row">
        <span class="lb2-ticker-text"><b>${escapeHtml(item.agency)}</b> returned <em>${title}</em></span>
        <span class="lb2-ticker-when">${when}</span>
      </li>
    `;
  }).join('');

  const agencyHtml = data.agencies.map(a => {
    const totalLabel = a.total === 1 ? 'RETURN' : 'RETURNS';
    const weekPart = a.total > 0 && a.thisWeek > 0
      ? `<span class="sep">&middot;</span>${a.thisWeek} THIS WEEK`
      : '';
    return `
      <li class="lb2-agency-row">
        <span class="lb2-agency-name">${escapeHtml(a.agency)}</span>
        <span class="lb2-agency-counts"><b>${a.total}</b> ${totalLabel}${weekPart}</span>
      </li>
    `;
  }).join('');

  openModal(`
    <div class="modal" role="dialog">
      <div class="lb2-label">Returned to date</div>
      <div class="lb2-total">${data.total}</div>
      <div class="lb2-sub">Small objects, <em>back where they belong</em>.</div>

      <div class="lb2-section-label">Recent returns</div>
      <ul class="lb2-ticker">${tickerHtml}</ul>

      <div class="lb2-section-label">By agency</div>
      <ul class="lb2-list">${agencyHtml}</ul>

      <div class="lb2-done-row">
        <button class="lb2-done-btn" id="lb-done">Done</button>
      </div>
    </div>
  `);
  document.getElementById('lb-done').addEventListener('click', closeModal);
}

/* ============ keyboard ============ */
document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea, select')) {
    if (e.key === 'Escape') e.target.blur();
    return;
  }
  if (e.key === '/') { e.preventDefault(); const s = document.getElementById('search'); if (s) s.focus(); }
  else if (e.key === 'n' || e.key === 'N') { e.preventDefault(); if (SUPABASE_URL) openPostModal(); }
  else if (e.key === 'Escape') closeModal();
});

/* ============ boot ============ */
loadLocal();
if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
  renderSetupScreen();
} else if (!window.supabase || !window.supabase.createClient) {
  // The Supabase CDN script didn't load — show a helpful message instead of a blank page.
  document.getElementById('app-root').innerHTML = `
    <div class="setup">
      <div style="font-family:var(--narrow);font-size:10px;color:var(--ink-4);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px;">The Department of Small Returns</div>
      <h2>Connection blocked</h2>
      <p>The Department couldn't reach the Supabase client library at <code>cdn.jsdelivr.net</code>. This usually means a network firewall, ad-blocker, or browser extension is interfering.</p>
      <p>Try: (1) disabling any ad-blocker for this page, (2) opening in a different browser, or (3) asking IT to whitelist <code>cdn.jsdelivr.net</code> and <code>*.supabase.co</code>.</p>
    </div>
  `;
} else {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  // If we don't have the user's identity yet, gate the experience behind a welcome.
  if (!state.me || !state.myName) {
    renderWelcomeGate();
  } else {
    renderShell();
    render();
    fetchFeed();
    fetchLeaderboard();
    subscribeRealtime();
  }
}

})(); // end IIFE
</script>
</body>
</html>
