<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Department of Small Returns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Narrow:wght@500;600;700&family=JetBrains+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/glacial-indifference-2" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --canvas: #F7F7F5;
  --paper: #FFFFFF;
  --paper-2: #FCFAF3;
  --ink: #0f0f0f;
  --ink-2: #2a2a2a;
  --ink-3: #6a6a6a;
  --ink-4: #9a9a9a;
  --yellow: #FFB800;
  --yellow-deep: #E8A600;
  --red-stamp: #C8352F;
  --green-stamp: #2F6B38;
  --purple-stamp: #5B4B8C;
  --lost: #B23A38;
  --line: rgba(15,15,15,0.09);
  --line-strong: rgba(15,15,15,0.18);
  --shadow-ticket: 0 1px 0 rgba(0,0,0,0.03), 0 4px 12px -6px rgba(0,0,0,0.08);
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --sans: 'Archivo', 'Inter', system-ui, sans-serif;
  --narrow: 'Archivo Narrow', 'Archivo', sans-serif;
  --sub: 'Glacial Indifference', 'Archivo', sans-serif;
  --italic: 'Libre Baskerville', Georgia, serif;
}

html, body {
  background: var(--canvas);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

body {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 32px 60px;
}

.page { display: block; }

/* =========== masthead =========== */
.mast {
  padding: 36px 0 24px;
  border-bottom: 1px dashed var(--line-strong);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 32px;
  align-items: end;
}

.mast-left {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  min-width: 0;
}

.mast-logo {
  width: 240px;
  max-width: 100%;
  display: block;
  margin: 0;
  position: relative;
  top: 7px;
}

.mast-right {
  text-align: right;
  padding-bottom: 0;
}

.counter-btn, .reunion-counter-btn {
  background: transparent;
  border: 1.5px solid var(--ink);
  color: var(--ink);
  padding: 12px 18px 14px;
  cursor: pointer;
  font-family: var(--sans);
  text-align: right;
  border-radius: 4px;
  transition: background-color 120ms cubic-bezier(0.2,0,0,1), color 120ms cubic-bezier(0.2,0,0,1), border-color 120ms cubic-bezier(0.2,0,0,1), transform 120ms cubic-bezier(0.2,0,0,1);
  display: inline-block;
}
.counter-btn:hover, .reunion-counter-btn:hover { background: var(--ink); color: var(--yellow); }

.counter-num, .mast-reunions-num {
  font-family: var(--sans);
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.02em;
  display: block;
}

.counter-lbl, .mast-reunions-lbl {
  font-family: var(--narrow);
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-top: 5px;
  opacity: 0.6;
  display: block;
}

.counter-status {
  font-family: var(--narrow);
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 8px;
}

.live-dot, .sync-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4ade80;
  flex-shrink: 0;
  animation: live-pulse 2s infinite;
}
.sync-dot.syncing { background: var(--yellow); }
.sync-dot.error { background: var(--red-stamp); animation: none; }

@keyframes live-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* =========== toolbar =========== */
.toolbar {
  padding: 16px 0;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 16px;
  align-items: center;
  border-bottom: 1px dashed var(--line);
}

.tabs {
  display: flex;
  gap: 2px;
  background: rgba(15,15,15,0.05);
  padding: 3px;
  border-radius: 6px;
}
.tab {
  background: transparent;
  border: none;
  padding: 8px 16px;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink-3);
  cursor: pointer;
  border-radius: 4px;
  font-weight: 500;
  letter-spacing: 0.01em;
}
.tab.active {
  background: var(--yellow);
  color: var(--ink);
  font-weight: 700;
}

.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid var(--line-strong);
  padding: 0 0 2px 0;
}
.search-wrap svg { color: var(--ink-4); flex-shrink: 0; }
.search {
  background: transparent;
  border: none;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  padding: 8px 0;
  outline: none;
  width: 100%;
}
.search::placeholder { color: var(--ink-4); }
.search-wrap:focus-within { border-bottom-color: var(--ink); }

.post-btn {
  background: transparent;
  color: var(--ink);
  border: 1.5px solid var(--ink);
  padding: 9px 18px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border-radius: 4px;
  letter-spacing: 0.02em;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.post-btn:hover { background: var(--ink); color: var(--canvas); }

/* =========== filters =========== */
.filters {
  padding: 12px 0 14px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  border-bottom: 1px dashed var(--line);
}
.filter-label {
  font-family: var(--narrow);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-4);
  margin-right: 6px;
}
.chip {
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--ink-2);
  padding: 5px 10px;
  font-family: var(--sans);
  font-size: 12px;
  cursor: pointer;
  border-radius: 3px;
  font-weight: 500;
}
.chip.active {
  background: transparent;
  color: var(--ink);
  border: 1.5px solid var(--ink);
  font-weight: 700;
}
.chip-sep { width: 1px; height: 18px; background: var(--line-strong); margin: 0 6px; }

/* =========== status filter indicator =========== */
.filter-indicator {
  padding: 10px 14px;
  margin: 14px 0;
  background: rgba(255,184,0,0.12);
  border-left: 3px solid var(--yellow);
  font-family: var(--narrow);
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--ink-2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.filter-indicator b { color: var(--ink); font-weight: 700; }
.filter-clear {
  background: transparent;
  border: none;
  font-family: var(--narrow);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-3);
  cursor: pointer;
  padding: 4px 8px;
}
.filter-clear:hover { color: var(--ink); }

/* =========== tickets (cards) =========== */
.feed {
  padding-top: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  position: relative;
  display: grid;
  grid-template-columns: 72px 1fr auto;
  background: var(--paper);
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  min-height: 130px;
  box-shadow: var(--shadow-ticket);
  transition: transform 140ms cubic-bezier(0.2,0,0,1), box-shadow 140ms cubic-bezier(0.2,0,0,1);
}

.card:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 0 rgba(0,0,0,0.03), 0 10px 28px -10px rgba(0,0,0,0.12);
}

.card.just-arrived { animation: card-slide-in 0.4s ease; }
@keyframes card-slide-in {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
.card.highlighted { box-shadow: 0 0 0 3px var(--yellow), 0 10px 28px -10px rgba(0,0,0,0.18); }

/* Yellow stub (redesigned: vertical filenum + small barcode) */
.thumb {
  position: relative;
  background: var(--yellow);
  padding: 14px 10px 14px;
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 10px;
  align-items: center;
  justify-items: center;
}
.thumb::after {
  content: '';
  position: absolute;
  top: 8px;
  bottom: 8px;
  right: -1px;
  width: 2px;
  background-image: radial-gradient(circle, var(--canvas) 1.5px, transparent 2px);
  background-size: 2px 7px;
  background-repeat: repeat-y;
}
.thumb::before {
  content: '';
  position: absolute;
  right: -7px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--canvas);
  z-index: 2;
}
.thumb .stub-filenum {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 14px;
  color: var(--ink);
  letter-spacing: 0.06em;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  opacity: 0.88;
}
.thumb .stub-barcode {
  width: 44px;
  height: 26px;
  display: block;
  opacity: 0.92;
}
.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 0;
}

/* Ticket body */
.card-body {
  padding: 18px 22px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-width: 0;
}

.card-title {
  font-family: var(--sans);
  font-weight: 700;
  font-size: 19px;
  letter-spacing: -0.01em;
  line-height: 1.2;
  margin-bottom: 4px;
  color: var(--ink);
}

.card-desc {
  font-size: 13.5px;
  color: var(--ink-3);
  line-height: 1.45;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.03em;
  color: var(--ink-4);
}
.card-meta .dot { width: 2px; height: 2px; background: var(--ink-4); border-radius: 50%; }
.card-meta b { font-weight: 500; color: var(--ink-2); }
.card-meta .found-by { color: var(--green-stamp); font-weight: 500; }

/* Pill — kind indicator, clickable for filter */
.pill {
  display: inline-flex;
  align-items: center;
  font-family: var(--narrow);
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 3px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background-color 120ms cubic-bezier(0.2,0,0,1), color 120ms cubic-bezier(0.2,0,0,1), border-color 120ms cubic-bezier(0.2,0,0,1), transform 120ms cubic-bezier(0.2,0,0,1);
}
.pill.lost { color: var(--lost); border-color: rgba(178,58,56,0.3); }
.pill.found { color: var(--green-stamp); border-color: rgba(47,107,56,0.3); }
.pill.claimed { color: var(--red-stamp); border-color: rgba(200,53,47,0.3); }
.pill.pending-handoff { color: var(--purple-stamp); border-color: rgba(91,75,140,0.3); }
.pill.reunited { color: var(--green-stamp); border-color: rgba(47,107,56,0.3); }
.pill:hover { background: rgba(15,15,15,0.04); }
.pill.filter-active {
  background: var(--ink);
  color: var(--yellow);
  border-color: var(--ink);
}

/* Right column action */
.card-actions {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: stretch;
  padding: 18px 22px 18px 12px;
  min-width: 160px;
  border-left: 1px dashed var(--line);
}

.contact {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-4);
  margin-bottom: 10px;
  text-align: right;
}
.contact.revealed { color: var(--ink-2); font-weight: 500; }

.action-btn {
  background: transparent;
  color: var(--ink);
  border: 1.5px solid var(--ink);
  padding: 8px 14px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  border-radius: 3px;
  letter-spacing: 0.02em;
  width: 100%;
}
.action-btn:hover { background: var(--ink); color: var(--paper); }
.action-btn.primary { background: var(--ink); color: var(--paper); }
.action-btn.primary:hover { background: var(--ink-2); }

/* State stamps */
.card.claimed::before {
  content: 'ON HOLD';
  position: absolute;
  top: 18px;
  right: 200px;
  font-family: var(--sans);
  font-weight: 900;
  font-size: 17px;
  letter-spacing: 0.10em;
  color: var(--red-stamp);
  opacity: 0.62;
  transform: rotate(-7deg);
  border: 2.5px solid var(--red-stamp);
  padding: 3px 9px;
  border-radius: 3px;
  pointer-events: none;
  z-index: 2;
}

.card.pending-handoff .thumb { background: #E0CFF5; }
.card.pending-handoff::before {
  content: 'PENDING';
  position: absolute;
  top: 50%;
  right: 195px;
  font-family: var(--sans);
  font-weight: 900;
  font-size: 19px;
  letter-spacing: 0.12em;
  color: var(--purple-stamp);
  opacity: 0.62;
  transform: translateY(-50%) rotate(-6deg);
  border: 2.5px solid var(--purple-stamp);
  padding: 3px 10px;
  border-radius: 3px;
  pointer-events: none;
  z-index: 2;
}

.card.reunited { background: var(--paper-2); opacity: 0.88; }
.card.reunited .thumb { background: #F4E6B8; }
.card.reunited::before {
  content: 'RETURNED';
  position: absolute;
  top: 20px;
  right: 190px;
  font-family: var(--sans);
  font-weight: 900;
  font-size: 21px;
  letter-spacing: 0.12em;
  color: var(--green-stamp);
  opacity: 0.70;
  transform: rotate(-8deg);
  border: 2.5px solid var(--green-stamp);
  padding: 3px 11px;
  border-radius: 3px;
  pointer-events: none;
  z-index: 2;
}
.card.reunited .card-title {
  text-decoration: line-through;
  text-decoration-thickness: 1px;
  color: var(--ink-3);
}
.card.reunited .card-actions { opacity: 0.55; }

/* =========== matches section =========== */
.matches {
  margin-top: 12px;
  padding: 10px 12px;
  background: rgba(47,107,56,0.06);
  border-left: 3px solid var(--green-stamp);
  border-radius: 3px;
}
.matches-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.matches-title {
  font-family: var(--narrow);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--green-stamp);
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.matches-hint {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-4);
  letter-spacing: 0.04em;
}
.match-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 12.5px;
}
.match-item-title { color: var(--ink-2); }
.match-view-btn {
  background: transparent;
  border: none;
  color: var(--green-stamp);
  font-family: var(--sans);
  font-weight: 700;
  font-size: 11px;
  cursor: pointer;
  letter-spacing: 0.02em;
}
.match-view-btn:hover { text-decoration: underline; }

/* =========== reunited strip =========== */
.reunited-strip {
  margin-top: 20px;
  border-top: 1px dashed var(--line);
  padding-top: 16px;
}
.reunited-strip-toggle {
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--narrow);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding: 6px 0;
}
.reunited-strip-toggle .count {
  background: var(--green-stamp);
  color: var(--paper);
  padding: 2px 7px;
  border-radius: 2px;
  font-weight: 700;
}
.reunited-strip-toggle .chev { transition: transform 160ms cubic-bezier(0.2,0,0,1); }
.reunited-strip-toggle.expanded .chev { transform: rotate(180deg); }
.reunited-strip-content {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 12px;
}

/* =========== empty state, loading =========== */
.empty {
  padding: 56px 24px;
  text-align: center;
}
.empty-quote {
  font-family: var(--italic);
  font-size: 17px;
  color: var(--ink-2);
  font-style: italic;
  line-height: 1.55;
  max-width: 52ch;
  margin: 0 auto 10px;
}
.empty-sub {
  font-family: var(--narrow);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-4);
}
.loading {
  padding: 56px 24px;
  text-align: center;
  font-family: var(--italic);
  font-style: italic;
  color: var(--ink-3);
  font-size: 15px;
}

/* =========== setup / welcome gate =========== */
.setup {
  max-width: 640px;
  margin: 60px auto;
  padding: 40px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 10px;
}
.setup h2 {
  font-family: var(--sans);
  font-weight: 800;
  font-size: 22px;
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}
.setup p, .setup li {
  font-family: var(--sub);
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.55;
  margin-bottom: 10px;
}
.setup ol { padding-left: 22px; }
.setup code {
  background: rgba(15,15,15,0.06);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 12.5px;
}

.welcome {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px;
}

.welcome-card {
  background: #FFFFFF;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 72px 80px;
  max-width: 1200px;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 80px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 12px 40px -12px rgba(0,0,0,0.08);
}

.welcome-left {
  padding-right: 20px;
}

.welcome-headline {
  font-family: var(--sans);
  font-weight: 900;
  font-size: 72px;
  line-height: 0.96;
  letter-spacing: -0.035em;
  color: var(--ink);
  margin-bottom: 24px;
}

.welcome-headline em {
  font-family: var(--italic);
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.015em;
}

.welcome-body {
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink-2);
  max-width: 44ch;
  margin-bottom: 0;
}

.welcome-body em {
  font-family: var(--italic);
  font-style: italic;
  font-weight: 400;
}

.welcome-logo {
  margin-top: 60px;
  width: 110px;
  display: block;
}

.welcome-right {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.welcome-field {
  padding: 18px 0;
  border-bottom: 1px solid var(--line-strong);
}
.welcome-field:first-of-type {
  border-top: 1px solid var(--line-strong);
}

.welcome-field label {
  display: block;
  font-family: var(--narrow);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 8px;
}

.welcome-field input {
  width: 100%;
  background: transparent;
  border: none;
  padding: 0;
  font-family: var(--sans);
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
  outline: none;
  letter-spacing: -0.01em;
}
.welcome-field input::placeholder {
  color: var(--ink-4);
  font-weight: 400;
}

.welcome-action-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 28px;
  gap: 20px;
}

.welcome-privacy {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-4);
  letter-spacing: 0.03em;
  line-height: 1.5;
  flex: 1;

.modal {
  background: var(--paper);

  border-radius: 10px;
  padding: 28px;

  width: 100%;
  max-height: calc(100vh - 80px);
  overflow-y: auto;
  box-shadow: 0 20px 60px -10px rgba(0,0,0,0.3);
}

.modal-title {
  font-family: var(--sans);
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
  line-height: 1.15;
  color: var(--ink);
}

.modal-sub {
  font-family: var(--sub);
  font-size: 13px;
  color: var(--ink-3);
  margin-bottom: 20px;
  line-height: 1.5;
}

.modal-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
  gap: 10px;
}
.modal-hint {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-4);
  letter-spacing: 0.04em;
  flex: 1;
  min-width: 0;
}
.btn-group { display: flex; gap: 8px; flex-shrink: 0; }

.btn-primary {
  background: transparent;
  color: var(--ink);
  border: 1.5px solid var(--ink);
  padding: 9px 18px;
  font-family: var(--sans);
  font-weight: 700;
  font-size: 13px;
  border-radius: 3px;
  cursor: pointer;
  transition: background-color 120ms cubic-bezier(0.2,0,0,1);
}
.btn-primary:hover { background: var(--ink); color: var(--canvas); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-secondary {
  background: transparent;
  border: none;
  color: var(--ink-3);
  padding: 9px 14px;
  font-family: var(--sans);
  font-weight: 600;
  font-size: 13px;
  border-radius: 3px;
  cursor: pointer;
}
.btn-secondary:hover { color: var(--ink); }

/* Form fields */
.field {
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
}
.field:last-of-type { border-bottom: none; }

.field label {
  display: block;
  font-family: var(--narrow);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 5px;
}
.field input, .field textarea, .field select {
  width: 100%;
  background: transparent;
  border: none;
  padding: 2px 0;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--ink);
  outline: none;
}
.field textarea { resize: vertical; min-height: 44px; }
.field input::placeholder, .field textarea::placeholder { color: var(--ink-4); }
.field-hint {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-4);
  margin-top: 4px;
  letter-spacing: 0.03em;
  line-height: 1.4;
}

.row2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.row2 .field { border-bottom: 1px solid var(--line); }

/* Segmented kind toggle */
.seg {
  display: flex;
  background: rgba(15,15,15,0.05);
  padding: 3px;
  border-radius: 5px;
  margin-bottom: 14px;
}
.seg button {
  flex: 1;
  background: transparent;
  border: none;
  padding: 8px 12px;
  font-family: var(--sans);
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink-3);
  cursor: pointer;
  border-radius: 3px;
}
.seg button.active { background: var(--yellow); color: var(--ink); font-weight: 800; }

/* Photo drop */
.photo-drop {
  display: block;
  padding: 18px;
  border: 1px dashed var(--line-strong);
  border-radius: 4px;
  text-align: center;
  font-family: var(--narrow);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  cursor: pointer;
  margin-top: 5px;
}
.photo-drop:hover { border-color: var(--ink); color: var(--ink); }
.photo-preview {
  max-width: 100%;
  max-height: 200px;
  display: block;
  margin: 0 auto;
  border-radius: 4px;
}

/* Me banner */
.me-banner {
  padding: 10px 14px;
  background: rgba(15,15,15,0.04);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--ink-2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  letter-spacing: 0.02em;
}
.me-banner b { font-weight: 600; color: var(--ink); }
.me-banner-link {
  background: transparent;
  border: none;
  color: var(--ink-3);
  font-family: var(--sans);
  font-weight: 600;
  font-size: 11px;
  cursor: pointer;
  padding: 2px 6px;
}
.me-banner-link:hover { color: var(--ink); }

/* Preview card inside modals */
.preview-card {
  padding: 14px 16px;
  background: var(--canvas);
  border-radius: 4px;
  margin-bottom: 18px;
  border-left: 3px solid var(--yellow);
}
.preview-card-title { font-family: var(--sans); font-weight: 700; font-size: 15px; margin-bottom: 3px; color: var(--ink); }
.preview-card-desc { font-size: 12.5px; color: var(--ink-3); line-height: 1.45; margin-bottom: 5px; }
.preview-card-meta { font-family: var(--mono); font-size: 10.5px; color: var(--ink-4); letter-spacing: 0.04em; }

/* Handoff code display */
.handoff-code-display {
  background: var(--canvas);
  padding: 28px 20px;
  border-radius: 6px;
  text-align: center;
  margin: 14px 0;
  border: 2px dashed var(--ink);
}
.handoff-code-label {
  font-family: var(--narrow);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 10px;
}
.handoff-code-digits {
  font-family: var(--mono);
  font-size: 44px;
  font-weight: 700;
  letter-spacing: 0.2em;
  line-height: 1;
  color: var(--ink);
}
.handoff-code-expiry {
  font-family: var(--narrow);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-4);
  margin-top: 10px;
}

.handoff-waiting {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(91,75,140,0.08);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--purple-stamp);
  letter-spacing: 0.02em;
}
.pulse {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--purple-stamp);
  animation: live-pulse 1.6s infinite;
  flex-shrink: 0;
}

.handoff-input-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin: 18px 0 6px;
}
.handoff-input-row input {
  width: 52px;
  height: 62px;
  text-align: center;
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
  border: 1.5px solid var(--line-strong);
  border-radius: 4px;
  background: var(--canvas);
  color: var(--ink);
  outline: none;
  transition: border-color 120ms cubic-bezier(0.2,0,0,1);
}
.handoff-input-row input:focus { border-color: var(--ink); }
.handoff-input-row input.error { border-color: var(--red-stamp); color: var(--red-stamp); }

/* Reveal box */
.reveal-box {
  padding: 20px;
  background: var(--canvas);
  border-radius: 4px;
  border-left: 3px solid var(--green-stamp);
  margin-bottom: 14px;
}
.reveal-label {
  font-family: var(--narrow);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 6px;
}
.reveal-email {
  font-family: var(--mono);
  font-size: 17px;
  font-weight: 500;
  color: var(--ink);
  word-break: break-all;
}
.reveal-phone {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--ink-2);
  margin-top: 3px;
}

/* Returns (formerly leaderboard) — redesign v2 */
.lb2-label {
  font-family: var(--narrow);
  font-size: 10.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-4);
  text-align: center;
  margin-bottom: 14px;
}
.lb2-total {
  text-align: center;
  font-family: var(--sans);
  font-size: 56px;
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--ink);
  margin-bottom: 8px;
}
.lb2-sub {
  text-align: center;
  font-family: var(--italic);
  font-style: italic;
  font-size: 14px;
  color: var(--ink-3);
  margin-bottom: 36px;
}
.lb2-sub em {
  font-family: var(--italic);
  font-style: italic;
}
.lb2-section-label {
  font-family: var(--narrow);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-4);
  padding: 0 4px 10px;
  border-bottom: 1px solid var(--line);
  margin-top: 28px;
}
.lb2-section-label:first-of-type { margin-top: 0; }
.lb2-ticker { list-style: none; padding: 0; margin: 0 0 8px; }
.lb2-ticker-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 12px 4px;
  border-bottom: 1px solid var(--line);
  gap: 16px;
}
.lb2-ticker-row:last-child { border-bottom: none; }
.lb2-ticker-text {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 400;
  color: var(--ink-2);
  letter-spacing: -0.005em;
  line-height: 1.4;
  flex: 1;
}
.lb2-ticker-text b { font-weight: 600; color: var(--ink); }
.lb2-ticker-text em {
  font-family: var(--italic);
  font-style: italic;
  font-weight: 400;
  color: var(--ink);
}
.lb2-ticker-when {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  color: var(--ink-4);
  white-space: nowrap;
  flex-shrink: 0;
}
.lb2-list { list-style: none; padding: 0; margin: 0; }
.lb2-agency-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 14px 4px;
  border-bottom: 1px solid var(--line);
}
.lb2-agency-row:last-child { border-bottom: none; }
.lb2-agency-name {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--ink);
}
.lb2-agency-counts {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--ink-3);
  text-transform: uppercase;
}
.lb2-agency-counts b { font-weight: 700; color: var(--ink); }
.lb2-agency-counts .sep {
  color: var(--ink-4);
  padding: 0 8px;
}
.lb2-empty { text-align: center; padding: 36px 20px; }
.lb2-empty-headline {
  font-family: var(--sans);
  font-weight: 800;
  font-size: 24px;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin-bottom: 10px;
}
.lb2-empty-headline em {
  font-family: var(--italic);
  font-style: italic;
  font-weight: 400;
}
.lb2-empty-body {
  font-family: var(--italic);
  font-style: italic;
  font-size: 14px;
  color: var(--ink-3);
  line-height: 1.6;
  max-width: 38ch;
  margin: 0 auto;
}
.lb2-done-row {
  display: flex;
  justify-content: flex-end;
  padding-top: 20px;
  margin-top: 20px;
  border-top: 1px solid var(--line);
}
.lb2-done-btn {
  background: transparent;
  border: none;
  color: var(--ink-3);
  padding: 12px 12px;
  font-family: var(--sans);
  font-weight: 500;
  font-size: 13px;
  cursor: pointer;
  border-radius: 3px;
}
.lb2-done-btn:hover { color: var(--ink); }

/* =========== toast =========== */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--ink);
  color: var(--paper);
  padding: 11px 18px;
  border-radius: 4px;
  font-family: var(--sans);
  font-size: 13px;
  letter-spacing: 0.01em;
  box-shadow: 0 10px 30px -8px rgba(0,0,0,0.4);
  opacity: 0;
  transition: opacity 200ms cubic-bezier(0.2,0,0,1), transform 200ms cubic-bezier(0.2,0,0,1);
  pointer-events: none;
  z-index: 2000;
  max-width: 90vw;
}
.toast.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.error { background: var(--red-stamp); }

/* =========== footer =========== */
.footer, .foot {
  margin-top: 48px;
  padding-top: 22px;
  border-top: 1px dashed var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}

.foot-tag {
  font-family: var(--italic);
  font-size: 12.5px;
  color: var(--ink-3);
  line-height: 1.5;
  font-style: italic;
  flex: 1;
  min-width: 0;
}

.foot-meta {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-4);
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.foot-meta .dot {
  width: 2px;
  height: 2px;
  background: var(--ink-4);
  border-radius: 50%;
}
.footer-kbd {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-4);
  letter-spacing: 0.04em;
}
.footer-kbd kbd {
  background: rgba(15,15,15,0.05);
  padding: 1px 5px;
  border-radius: 2px;
  font-family: var(--mono);
  font-size: 10px;
  margin: 0 2px;
}

/* =========== mobile =========== */
@media (max-width: 720px) {
  body { padding: 0 16px 60px; }
  .mast { grid-template-columns: 1fr; gap: 16px; align-items: start; }
  .mast-logo { width: 100%; max-width: 240px; margin: 0; }
  .mast-right { text-align: left; }
  .counter-btn, .reunion-counter-btn { text-align: left; }
  .counter-status { justify-content: flex-start; }
  .toolbar { grid-template-columns: 1fr; }
  .card { grid-template-columns: 60px 1fr; }
  .card-actions {
    grid-column: 1 / -1;
    border-left: none;
    border-top: 1px dashed var(--line);
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    min-width: 0;
  }
  .contact { margin-bottom: 0; text-align: left; }
  .action-btn { width: auto; }
  .card.claimed::before, .card.pending-handoff::before, .card.reunited::before { right: 12px; }
  .row2 { grid-template-columns: 1fr; }
  .handoff-input-row input { width: 44px; height: 54px; font-size: 24px; }
  .footer, .foot { flex-direction: column; align-items: flex-start; gap: 8px; }
}

/* hide debug indicator in production */
#rt-debug { display: none !important; }


/* =========== Phase 3 — filter bar + empty states =========== */

/* Replace .toolbar / .filters visual weight. Keep class names but also scope .p3- */
.p3-bar {
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 22px 28px;
  border-bottom: 1px solid var(--line);
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
  flex-wrap: nowrap;
}

/* Kind tabs — editorial underline */
.p3-tabs { display: inline-flex; gap: 0; flex-shrink: 0; }
.p3-tabs button {
  background: transparent;
  border: none;
  padding: 8px 0;
  margin-right: 24px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-4);
  cursor: pointer;
  letter-spacing: -0.005em;
  position: relative;
  transition: color 120ms cubic-bezier(0.2,0,0,1);
}
.p3-tabs button:last-child { margin-right: 0; }
.p3-tabs button:hover { color: var(--ink-2); }
.p3-tabs button.active { color: var(--ink); }
.p3-tabs button.active::after {
  content: '';
  position: absolute;
  bottom: -23px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--ink);
}
.p3-tabs button .count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-4);
  margin-left: 4px;
  font-weight: 500;
}

/* Search — hairline bottom border, icon prefix */
.p3-search {
  flex: 1;
  position: relative;
  max-width: 380px;
  min-width: 160px;
}
.p3-search input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  padding: 10px 0 10px 24px;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--ink);
  outline: none;
  letter-spacing: -0.005em;
  transition: border-color 120ms cubic-bezier(0.2,0,0,1);
}
.p3-search input::placeholder { color: var(--ink-4); font-weight: 400; }
.p3-search input:focus { border-bottom-color: var(--ink); }
.p3-search .icon {
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: var(--ink-4);
  pointer-events: none;
}

/* Filters trigger — pill with count badge */
.p3-filter-trigger {
  background: transparent;
  border: 1px solid var(--line-strong);
  padding: 8px 14px;
  font-family: var(--sans);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-2);
  cursor: pointer;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background-color 120ms cubic-bezier(0.2,0,0,1), color 120ms cubic-bezier(0.2,0,0,1), border-color 120ms cubic-bezier(0.2,0,0,1), transform 120ms cubic-bezier(0.2,0,0,1);
  flex-shrink: 0;
}
.p3-filter-trigger:hover { border-color: var(--ink); color: var(--ink); }
.p3-filter-trigger svg { width: 11px; height: 11px; }
.p3-filter-trigger .badge {
  background: var(--ink);
  color: var(--paper);
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 999px;
  margin-left: 2px;
  line-height: 1.4;
}

/* Primary file button (override existing .post-btn if needed — but keep old class working) */
.p3-file-btn {
  background: var(--ink);
  color: var(--paper);
  border: 1.5px solid var(--ink);
  padding: 10px 18px;
  font-family: var(--sans);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.005em;
  border-radius: 3px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
  flex-shrink: 0;
}
.p3-file-btn:hover { background: var(--ink-2); }

/* Active chips row (below bar) */
.p3-active-chips {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  border-bottom: 1px solid var(--line);
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
  flex-wrap: wrap;
}
.p3-chip {
  background: rgba(15,15,15,0.05);
  border: none;
  padding: 6px 8px 6px 12px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-2);
  cursor: pointer;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background-color 120ms cubic-bezier(0.2,0,0,1);
}
.p3-chip:hover { background: rgba(15,15,15,0.1); }
.p3-chip svg { width: 10px; height: 10px; opacity: 0.6; }
.p3-chip-clear {
  background: transparent;
  border: none;
  font-family: var(--sans);
  font-size: 11px;
  color: var(--ink-3);
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
  margin-left: 4px;
  padding: 4px 8px;
}
.p3-chip-clear:hover { color: var(--ink); }

/* Filter sheet (popover) */
.p3-filter-sheet-backdrop {
  position: fixed;
  inset: 0;
  background: transparent;
  z-index: 100;
}
.p3-filter-sheet {
  position: absolute;
  background: var(--paper);
  border: 1px solid var(--line-strong);
  border-radius: 12px;
  padding: 24px 28px;
  min-width: 360px;
  max-width: 440px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 12px 30px -10px rgba(0,0,0,0.15);
  z-index: 101;
}
.p3-filter-sheet h3 {
  font-family: var(--narrow);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 14px;
  margin-top: 0;
  font-weight: 600;
}
.p3-filter-sheet h3:not(:first-of-type) { margin-top: 22px; }
.p3-filter-sheet .p3-opt-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.p3-filter-sheet .p3-opt-row button {
  background: transparent;
  border: 1px solid var(--line-strong);
  padding: 7px 14px;
  font-family: var(--sans);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-2);
  cursor: pointer;
  border-radius: 999px;

const LS_ME = 'omnicom-concierge-me';
const LS_TIPS_SEEN = 'omnicom-concierge-tips-seen-v1';
const LS_MY_NAME = 'omnicom-concierge-my-name';
const LS_REVEALED = 'omnicom-concierge-revealed';
const LS_MY_POSTS = 'omnicom-concierge-my-posts';

let supabase = null;

const LS_PREFS = 'omnicom-concierge-prefs';

let state = {
  items: [],
  reunionCount: 0,
  activeTab: 'all',
  filterAgency: 'all',
  filterFloor: 'all',
  filterStatus: null,  // null, 'lost', 'found', 'claimed', 'pending_handoff', 'reunited'
  search: '',
  me: null,
  myName: null,
  revealed: {},
  myPosts: {},
  loading: true,
  syncStatus: 'syncing',
  recentArrivals: new Set(),
  showReunited: false,
  prefs: { lastFloor: null, lastAgency: null },
  leaderboard: null,
  leaderboardOpen: false
};

function loadLocal() {
  try {
    state.me = localStorage.getItem(LS_ME) || null;
    state.myName = localStorage.getItem(LS_MY_NAME) || null;
    state.revealed = JSON.parse(localStorage.getItem(LS_REVEALED) || '{}');
    state.myPosts = JSON.parse(localStorage.getItem(LS_MY_POSTS) || '{}');
    const prefs = JSON.parse(localStorage.getItem(LS_PREFS) || '{}');
    state.prefs = { lastFloor: prefs.lastFloor || null, lastAgency: prefs.lastAgency || null };
  } catch(e) {}
}
function saveMe() { try { if (state.me) localStorage.setItem(LS_ME, state.me); } catch(e) {} }
function saveMyName() { try { if (state.myName) localStorage.setItem(LS_MY_NAME, state.myName); } catch(e) {} }
function saveRevealed() { try { localStorage.setItem(LS_REVEALED, JSON.stringify(state.revealed)); } catch(e) {} }
function saveMyPosts() { try { localStorage.setItem(LS_MY_POSTS, JSON.stringify(state.myPosts)); } catch(e) {} }
function savePrefs() { try { localStorage.setItem(LS_PREFS, JSON.stringify(state.prefs)); } catch(e) {} }

/* Format a name from parts — user types "Rahul Shah", we store "Rahul S." */
function formatDisplayName(input) {
  const raw = (input || '').trim();
  if (!raw) return '';
  const parts = raw.split(/\s+/);
  if (parts.length === 1) return parts[0];
  const first = parts[0];
  const lastInitial = (parts[parts.length - 1] || '')[0];
  return lastInitial ? `${first} ${lastInitial.toUpperCase()}.` : first;
}

/* Return the category label to show on a card, preferring custom 'other' text */
function categoryLabelFor(item) {
  if (item.category === 'other') return item.otherCategory || '';
  const cat = CATEGORIES.find(c => c.id === item.category);
  return cat ? cat.label : '';
}

/* ============ helpers ============ */
function timeAgo(ts) {
  const t = typeof ts === 'string' ? new Date(ts).getTime() : ts;
  const s = Math.floor((Date.now()-t)/1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 86400*7) return Math.floor(s/86400) + 'd ago';
  const d = new Date(t);
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
}
function absDate(ts) {
  const t = typeof ts === 'string' ? new Date(ts).getTime() : ts;
  const d = new Date(t);
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short' }).toUpperCase();
}
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function similarity(a, b) {
  if (a.kind === b.kind) return 0;
  let score = 0;
  if (a.category === b.category) score += 0.5;
  if (a.floor === b.floor) score += 0.2;
  if (Math.abs(a.floor - b.floor) === 1) score += 0.1;
  if (a.agency === b.agency) score += 0.1;
  const aw = (a.title + ' ' + a.desc).toLowerCase().split(/\W+/).filter(w => w.length > 3);
  const bw = new Set((b.title + ' ' + b.desc).toLowerCase().split(/\W+/).filter(w => w.length > 3));
  const overlap = aw.filter(w => bw.has(w)).length;
  score += Math.min(0.4, overlap * 0.15);
  return score;
}
function findMatches(item) {
  return state.items
    .filter(x => x.kind !== item.kind && x.status === 'open' && x.id !== item.id)
    .map(x => ({ item: x, score: similarity(item, x) }))
    .filter(m => m.score >= 0.55)
    .sort((a,b) => b.score - a.score)
    .slice(0, 3);
}

/* Derive the visual state of an item: lost | found | claimed | pending_handoff | reunited */
function visualStateOf(item) {
  if (item.status === 'reunited') return 'reunited';
  if (item.status === 'pending_handoff') return 'pending_handoff';
  if ((item.revealCount || 0) > 0) return 'claimed';
  return item.kind; // 'lost' or 'found'
}

function visibleItems() {
  const statusRank = { pending_handoff: 0, open: 1, reunited: 2 };
  return state.items.filter(i => {
    // Tab filtering
    if (state.activeTab === 'lost' && i.kind !== 'lost') return false;
    if (state.activeTab === 'found' && i.kind !== 'found') return false;
    if (state.activeTab === 'mine') {
      const isMine = state.myPosts[i.id] === true;
      const revealed = state.revealed[i.id];
      if (!isMine && !revealed) return false;
    }
    // Status filter (from pill clicks)
    if (state.filterStatus) {
      if (visualStateOf(i) !== state.filterStatus) return false;
    }
    // Hide reunited items from the main feed — they only live in the collapsed/expanded strip.
    // Exception: when user has clicked the "reunited" pill to filter explicitly, or they're
    // on the "mine" tab (where reunited items they were involved in should still appear).
    if (state.activeTab !== 'mine' && state.filterStatus !== 'reunited'
        && i.status === 'reunited') return false;
    if (state.filterAgency !== 'all' && i.agency !== state.filterAgency) return false;
    if (state.filterFloor !== 'all' && String(i.floor) !== state.filterFloor) return false;
    if (state.search) {
      const q = state.search.toLowerCase().trim();
      if (!q) return true;
      const hay = (i.title + ' ' + i.desc + ' ' + i.agency + ' floor ' + i.floor + ' ' + i.kind).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => {
    const sa = statusRank[a.status] ?? 3;
    const sb = statusRank[b.status] ?? 3;
    if (sa !== sb) return sa - sb;
    return new Date(b.ts).getTime() - new Date(a.ts).getTime();
  });
}

function reunitedItems() {
  return state.items
    .filter(i => i.status === 'reunited')
    .sort((a,b) => new Date(b.ts).getTime() - new Date(a.ts).getTime());
}

/* ============ Supabase I/O ============ */
function rowToItem(r) {
  return {
    id: r.id,
    kind: r.kind,
    title: r.title,
    desc: r.description,
    category: r.category,
    otherCategory: r.other_category || null,
    agency: r.agency,
    floor: Number(r.floor) || 0,
    emailMasked: r.email_masked || '',
    displayName: r.display_name || null,
    photo: r.photo || null,
    ts: r.created_at,
    updatedAt: r.updated_at || r.created_at,
    status: r.status || 'open',
    handoffInitiatorMasked: r.handoff_initiator_masked || null,
    handoffExpiresAt: r.handoff_code_expires_at || null,
    revealCount: Number(r.reveal_count) || 0
  };
}

async function fetchFeed() {
  state.syncStatus = 'syncing';
  updateSyncDot();
  try {
    const { data, error } = await supabase
      .from('concierge_items_public')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) throw error;
    state.items = (data || []).map(rowToItem);
    state.reunionCount = state.items.filter(i => i.status === 'reunited').length;
    state.loading = false;
    state.syncStatus = 'idle';
    render();
  } catch(err) {
    state.syncStatus = 'error';
    state.loading = false;
    render();
    console.error('[Dept] fetchFeed failed:', err?.message || err, err);
  }
}

function subscribeRealtime() {
  console.log('[Dept] Subscribing to realtime...');
  const channel = supabase
    .channel('concierge-items')
    .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'concierge_items' },
        payload => {
          console.log('[Dept] Realtime INSERT:', payload);
          const badge = document.getElementById('rt-debug');
          if (badge) badge.textContent = 'RT: INSERT ' + new Date().toLocaleTimeString();
          handleRealtimeInsert(payload.new);
        }
    )
    .on('postgres_changes',
        { event: 'UPDATE', schema: 'public', table: 'concierge_items' },
        payload => {
          console.log('[Dept] Realtime UPDATE:', payload);
          const badge = document.getElementById('rt-debug');
          if (badge) badge.textContent = 'RT: UPDATE ' + new Date().toLocaleTimeString();
          handleRealtimeUpdate(payload.new);
        }
    )
    .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'concierge_reveals' },
        payload => {
          // Someone claimed an item. Refetch that item so our local revealCount
          // reflects the new value and the "ON HOLD" stamp appears on every
          // open screen (including the original poster's).
          console.log('[Dept] Realtime REVEAL:', payload);
          const badge = document.getElementById('rt-debug');
          if (badge) badge.textContent = 'RT: REVEAL ' + new Date().toLocaleTimeString();
          handleRealtimeReveal(payload.new);
        }
    )
    .subscribe((status, err) => {
      console.log('[Dept] Subscription status:', status, err || '');
      const badge = document.getElementById('rt-debug');
      if (badge) badge.textContent = 'RT: ' + status;
      if (status === 'SUBSCRIBED') {
        state.syncStatus = 'idle';
      } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
        state.syncStatus = 'error';
        setTimeout(() => {
          channel.unsubscribe();
          subscribeRealtime();
        }, 3000);
      }
      updateSyncDot();
    });
  return channel;
}

async function handleRealtimeInsert(row) {
  // We need the masked email, which only the view provides. Fetch just this row.
  try {
    const { data, error } = await supabase
      .from('concierge_items_public')
      .select('*')
      .eq('id', row.id)
      .single();
    if (error || !data) return;
    const item = rowToItem(data);
    if (state.items.some(x => x.id === item.id)) return;
    state.items.unshift(item);
    // Only animate if it's not one I just posted.
    if (!state.myPosts[item.id]) {
      state.recentArrivals.add(item.id);
      setTimeout(() => { state.recentArrivals.delete(item.id); }, 800);
    }
    render();
  } catch(e) { /* ignore */ }
}

async function handleRealtimeUpdate(row) {
  const existing = state.items.find(x => x.id === row.id);
  if (!existing) return;
  const wasReunited = existing.status === 'reunited';
  const nowReunited = row.status === 'reunited';
  existing.status = row.status;
  // Keep updatedAt in sync so the returns ticker orders & "this week" counts stay accurate.
  if (row.updated_at) existing.updatedAt = row.updated_at;
  // Refresh handoff fields from the public view so we have the masked initiator.
  try {
    const { data } = await supabase
      .from('concierge_items_public')
      .select('handoff_initiator_masked, handoff_code_expires_at')
      .eq('id', row.id)
      .single();
    if (data) {
      existing.handoffInitiatorMasked = data.handoff_initiator_masked || null;
      existing.handoffExpiresAt = data.handoff_code_expires_at || null;
    }
  } catch(e) {}
  if (!wasReunited && nowReunited) {
    state.reunionCount += 1;
    bumpReunionCounter();
  }
  render();
}

function bumpReunionCounter() {
  const el = document.getElementById('reunion-count');
  if (!el) return;
  el.classList.add('bumped');
  setTimeout(() => el.classList.remove('bumped'), 400);
}

/* When a reveal happens (someone claims an item), re-fetch that one item
   so its revealCount updates and the "ON HOLD" stamp/Claimed pill appear
   on everyone's open screen. */
async function handleRealtimeReveal(row) {
  if (!row || !row.item_id) return;
  const existing = state.items.find(x => x.id === row.item_id);
  if (!existing) return;
  try {
    const { data, error } = await supabase
      .from('concierge_items_public')
      .select('*')
      .eq('id', row.item_id)
      .single();
    if (error || !data) return;
    existing.revealCount = Number(data.reveal_count) || 0;
    render();
  } catch(e) { /* ignore */ }
}

function updateSyncDot() {
  const syncDot = document.querySelector('.sync-dot');
  if (!syncDot) return;
  syncDot.className = 'sync-dot ' + (state.syncStatus === 'syncing' ? 'syncing' : state.syncStatus === 'error' ? 'error' : '');
  const label = syncDot.nextElementSibling;
  if (label) label.textContent = state.syncStatus === 'syncing' ? 'Connecting' : (state.syncStatus === 'error' ? 'Offline — will retry' : 'Live');
}

          <li><span class="num">02</span><span>The other person sees it, claims it, and reveals their contact.</span></li>

  `;

  const nameEl = document.getElementById('w-name');
  const emailEl = document.getElementById('w-email');
  const btn = document.getElementById('w-continue');

  function submit() {
    const rawName = nameEl.value.trim();
    const email = emailEl.value.trim().toLowerCase();
    if (!rawName) { toast('Add your name', true); nameEl.focus(); return; }
    if (!email) { toast('Add your work email', true); emailEl.focus(); return; }
    // Syntax check: user@domain.tld
    const _emailRe = /^[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$/i;
    if (!_emailRe.test(email)) { toast('That email doesn\u2019t look right', true); emailEl.focus(); return; }
    if (!VALID_DOMAINS.includes(email.split('@')[1])) { toast('Use your @omc.com email', true); emailEl.focus(); return; }
    state.me = email;
    state.myName = formatDisplayName(rawName);
    saveMe();
    saveMyName();
    renderShell();
    render();
    fetchFeed();
    fetchLeaderboard();
    subscribeRealtime();
  }

  btn.addEventListener('click', submit);
  [nameEl, emailEl].forEach(el => el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); submit(); }
  }));
}

/* Render just the filter bar HTML. Called by renderShell() at initial mount,
   and by render() whenever state changes that affect tab counts or active states.
   Wrapping div has id="p3-bar-wrap" so render() can swap its contents without
   disturbing the search input focus. */
function renderFilterBar() {
  const all = state.items.filter(i => i.status !== 'reunited');
  const lost = all.filter(i => i.kind === 'lost');
  const found = all.filter(i => i.kind === 'found');
  const mine = all.filter(i => state.myPosts[i.id] === true || (state.revealed[i.id] && state.me));
  const activeFilterCount = (state.filterAgency !== 'all' ? 1 : 0) + (state.filterFloor !== 'all' ? 1 : 0);
  return `
    <div id="p3-bar-wrap">
      <div class="p3-bar">
        <div class="p3-tabs">
          <button class="${state.activeTab==='all'?'active':''}" data-tab="all">All <span class="count">${all.length}</span></button>
          <button class="${state.activeTab==='lost'?'active':''}" data-tab="lost">Lost <span class="count">${lost.length}</span></button>
          <button class="${state.activeTab==='found'?'active':''}" data-tab="found">Found <span class="count">${found.length}</span></button>
          <button class="${state.activeTab==='mine'?'active':''}" data-tab="mine">Mine <span class="count">${mine.length}</span></button>
        </div>
        <div class="p3-search">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search" placeholder="Search by item, floor, agency\u2026" value="${escapeHtml(state.search)}"/>
        </div>
        <button class="p3-filter-trigger" id="p3-filter-trigger">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M6 12h12M10 18h4"/></svg>
          Filters${activeFilterCount > 0 ? ` <span class="badge">${activeFilterCount}</span>` : ''}
        </button>
        <button class="p3-file-btn" id="post-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          File a ticket
        </button>
      </div>
      ${activeFilterCount > 0 ? `
      <div class="p3-active-chips">
        ${state.filterAgency !== 'all' ? `<button class="p3-chip" data-remove-filter="agency">${escapeHtml(state.filterAgency)}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></button>` : ''}
        ${state.filterFloor !== 'all' ? `<button class="p3-chip" data-remove-filter="floor">Floor ${state.filterFloor}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></button>` : ''}
        <button class="p3-chip-clear" id="p3-clear-all">Clear all</button>
      </div>` : ''}
    </div>
  `;
}

function renderShell() {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) { renderSetupScreen(); return; }

  const root = document.getElementById('app-root');
  const syncClass = state.syncStatus === 'syncing' ? 'syncing' : (state.syncStatus === 'error' ? 'error' : '');
  const syncText = state.syncStatus === 'syncing' ? 'Connecting' : (state.syncStatus === 'error' ? 'Offline — will retry' : 'Live');

  root.innerHTML = `

// Build a deterministic barcode SVG from an item id. Each id gets its own
// unique stripe pattern. Widths chosen from a small set for visual variety.
function buildBarcodeSVG(id) {
  // Simple hash to seed the pattern
  let h = 0;
  for (let i = 0; i < id.length; i++) h = ((h << 5) - h + id.charCodeAt(i)) | 0;
  const rnd = (() => { let s = Math.abs(h) || 1; return () => { s = (s * 1664525 + 1013904223) | 0; return Math.abs(s) / 0x7fffffff; }; })();
  const widths = [1, 1, 1.5, 1.5, 2, 2, 2.5, 3];
  const gaps = [1.5, 2, 2.5, 3];
  const bars = [];
  let x = 0;
  const totalW = 44;
  while (x < totalW) {
    const bw = widths[Math.floor(rnd() * widths.length)];
    if (x + bw > totalW) break;
    bars.push(`<rect x="${x.toFixed(2)}" y="0" width="${bw}" height="26"/>`);
    x += bw + gaps[Math.floor(rnd() * gaps.length)];
  }
  return `<svg class="stub-barcode" viewBox="0 0 44 26" preserveAspectRatio="none"><g fill="currentColor">${bars.join('')}</g></svg>`;
}

function renderCard(item) {
  const matches = item.status === 'open' ? findMatches(item) : [];
  const isMine = state.myPosts[item.id] === true;
  const revealed = state.revealed[item.id];
  const isInitiator = state.me && item.handoffInitiatorMasked && isMineByMask(state.me, item.handoffInitiatorMasked) && (isMine || revealed);
  const isInvolved = isMine || revealed;

  // File number: stable rank from oldest. state.items sorted DESC, so
  // oldest ticket = highest index => file number = (length - index).
  const _idx = state.items.findIndex(x => x.id === item.id);
  const _fileNum = _idx >= 0 ? (state.items.length - _idx) : state.items.length;
  const fileNumStr = String(_fileNum).padStart(4, '0');
  // Deterministic barcode pattern from item.id
  const _barcode = buildBarcodeSVG(item.id);
  const photoOrIcon = item.photo
    ? `<div class="thumb"><img src="${item.photo}" alt=""/><div class="stub-filenum">${fileNumStr}</div>${_barcode}</div>`
    : `<div class="thumb"><div class="stub-filenum">${fileNumStr}</div>${_barcode}</div>`;

  // Pill content varies by visual state. Click-to-filter via data-filter.
  const vstate = visualStateOf(item);
  let pillClass, pillText, pillGlyph = '', pillFilterKey = '';
  if (vstate === 'reunited') { pillClass = 'reunited'; pillText = 'Reunited'; pillFilterKey = 'reunited'; }
  else if (vstate === 'pending_handoff') { pillClass = 'pending-handoff'; pillText = 'Handoff in progress'; pillFilterKey = 'pending_handoff'; }
  else if (vstate === 'claimed') { pillClass = 'claimed'; pillText = 'Claimed'; pillFilterKey = 'claimed'; }
  else if (vstate === 'lost') { pillClass = 'lost'; pillText = 'lost'; pillFilterKey = 'lost'; }
  else { pillClass = 'found'; pillText = 'found'; pillFilterKey = 'found'; }
  const filterActiveClass = state.filterStatus === pillFilterKey ? 'filter-active' : '';

  // Contact column.
  let contact;
  if (item.status === 'reunited') {
    contact = '<span class="contact" style="opacity:0.6;">Closed</span>';
  } else if (revealed) {
    const phone = revealed.phone ? '<br/>' + escapeHtml(revealed.phone) : '';
    contact = `<span class="contact revealed">${escapeHtml(revealed.email)}${phone}</span>`;
  } else if (isMine && state.me) {
    contact = `<span class="contact revealed">${escapeHtml(state.me)}</span>`;
  } else {
    contact = `<span class="contact">${escapeHtml(item.emailMasked)}</span>`;
  }

  // Action button logic.
  let actionBtn = '';
  if (item.status === 'open') {
    if (isInvolved) {
      actionBtn = `<button class="action-btn" data-action="start-handoff" data-id="${item.id}">Start handoff →</button>`;
    } else {
      actionBtn = `<button class="action-btn primary" data-action="claim" data-id="${item.id}">${item.kind === 'found' ? "It's mine" : 'I found it'}</button>`;
    }
  } else if (item.status === 'pending_handoff') {
    if (isInitiator) {
      actionBtn = `<button class="action-btn" data-action="show-handoff" data-id="${item.id}">Show code</button>`;
    } else if (isInvolved) {
      actionBtn = `<button class="action-btn primary" data-action="enter-handoff" data-id="${item.id}">Enter code</button>`;
    }
  }

  let matchesHtml = '';
  if (matches.length) {
    matchesHtml = `
      <div class="matches">
        <div class="matches-head">
          <span class="matches-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 12l3 3 5-6"/><circle cx="12" cy="12" r="9"/></svg>
            ${matches.length} possible ${matches.length === 1 ? 'match' : 'matches'}
          </span>
          <span class="matches-hint">Tap to view</span>
        </div>
        ${matches.map(m => `
          <div class="match-item">
            <span class="match-item-title">${escapeHtml(m.item.title)}</span>
            <button class="match-view-btn" data-action="scroll-to" data-id="${m.item.id}">View →</button>
          </div>
        `).join('')}
      </div>`;
  }

  const arrivedClass = state.recentArrivals.has(item.id) ? 'just-arrived' : '';
  const statusClass = vstate === 'reunited' ? 'reunited'
    : vstate === 'pending_handoff' ? 'pending-handoff'
    : vstate === 'claimed' ? 'claimed'
    : '';

  return `
    <article class="card ${statusClass} ${arrivedClass}" data-id="${item.id}">
      ${photoOrIcon}
      <div class="card-body">
        <h3 class="card-title">${escapeHtml(item.title)}</h3>
        <p class="card-desc">${escapeHtml(item.desc)}</p>
        <div class="card-meta">
          <span class="pill ${pillClass} ${filterActiveClass}" data-filter="${pillFilterKey}" title="Click to filter">${pillGlyph}${pillText}</span>
          ${categoryLabelFor(item) ? `<span>${escapeHtml(categoryLabelFor(item))}</span><span class="dot"></span>` : ''}
          <span>Floor ${item.floor}</span><span class="dot"></span>
          <span>${escapeHtml(item.agency)}</span><span class="dot"></span>
          <span>${absDate(item.ts)} · ${timeAgo(item.ts)}</span>
          ${item.status === 'reunited' && item.kind === 'found' && item.displayName ? `<span class="dot"></span><span class="found-by">Found by ${escapeHtml(item.displayName)}</span>` : ''}
        </div>
        ${matchesHtml}
      </div>
      <div class="card-actions">
        ${contact}
        ${actionBtn}
      </div>
    </article>
  `;
}

/* Compare a full email against a masked initiator string to detect ownership. */
function isMineByMask(myEmail, mask) {
  if (!myEmail || !mask) return false;
  const [myUser, myDomain] = myEmail.toLowerCase().split('@');
  const [maskUser, maskDomain] = mask.toLowerCase().split('@');
  if (myDomain !== maskDomain) return false;
  // Mask format: X•••Y or XX•••Y or X•••
  const first = maskUser.replace(/•/g,'')[0] || '';
  const lastPart = maskUser.split('•').pop();
  const last = lastPart && lastPart.length ? lastPart[lastPart.length-1] : '';
  if (myUser[0] !== first) return false;
  if (last && myUser[myUser.length-1] !== last) return false;
  return true;
}

function render() {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return;

  const rCount = document.getElementById('reunion-count');
  if (rCount) rCount.textContent = state.reunionCount;

  updateSyncDot();

  const banner = document.getElementById('me-banner-slot');
  if (banner) {
    // Identity is now always set via the welcome gate, so no permanent banner needed.
    // We only clear it.
    banner.innerHTML = '';
  }

  // Re-render the filter bar so tab counts, active states, and filter chips
  // stay in sync with state. Preserve search input focus & cursor if the user
  // is mid-typing — otherwise a realtime UPDATE would yank their caret.
  const barWrap = document.getElementById('p3-bar-wrap');
  if (barWrap) {
    const searchEl = document.getElementById('search');
    const hadFocus = document.activeElement === searchEl;
    const caret = hadFocus ? searchEl.selectionStart : null;
    // renderFilterBar returns a wrapper div, so replace outerHTML of the wrapper
    barWrap.outerHTML = renderFilterBar();
    // Re-bind all shell events (tabs, search, filter trigger, post btn, leaderboard, chips)
    bindShellEvents();
    if (hadFocus) {
      const newSearch = document.getElementById('search');
      if (newSearch) {
        newSearch.focus();
        if (caret != null) newSearch.setSelectionRange(caret, caret);
      }
    }
  }

  // Status filter indicator — shown when a pill has been clicked to filter the feed.
  const indicator = document.getElementById('filter-indicator-slot');
  if (indicator) {
    if (state.filterStatus) {
      const labels = { lost: 'Lost', found: 'Found', claimed: 'Claimed', pending_handoff: 'Handoff in progress', reunited: 'Reunited' };
      indicator.innerHTML = `<div class="filter-indicator">Showing <b>${labels[state.filterStatus] || state.filterStatus}</b> only<button class="filter-clear" id="clear-status-filter" aria-label="Clear filter">Clear ×</button></div>`;
      const clr = document.getElementById('clear-status-filter');
      if (clr) clr.addEventListener('click', () => { state.filterStatus = null; render(); });
    } else {
      indicator.innerHTML = '';
    }
  }

  const feed = document.getElementById('feed');
  if (!feed) return;
  if (state.loading) {
    feed.innerHTML = '<div class="loading">Loading the feed…</div>';
    return;
  }
  const items = visibleItems();
  if (items.length === 0) {
    feed.innerHTML = renderEmptyState();
  } else {
    feed.innerHTML = items.map(renderCard).join('');
  }

  renderReunitedStrip();
}


function openFilterSheet(anchorEl) {
  // Tear down any existing
  const existing = document.getElementById('p3-filter-sheet-backdrop');
  if (existing) { existing.remove(); return; }

  // Snapshot current filter state (so user can Cancel / Apply)
  let selAgency = state.filterAgency;
  let selFloor = state.filterFloor;

  const backdrop = document.createElement('div');
  backdrop.id = 'p3-filter-sheet-backdrop';
  backdrop.className = 'p3-filter-sheet-backdrop';
  backdrop.innerHTML = `
    <div class="p3-filter-sheet" id="p3-filter-sheet">
      <h3>Agency</h3>
      <div class="p3-opt-row" id="p3-agency-row">
        ${AGENCIES.map(a => `<button data-val="${escapeHtml(a)}" class="${selAgency===a?'selected':''}">${escapeHtml(a)}</button>`).join('')}
      </div>
      <h3>Floor</h3>
      <div class="p3-opt-row" id="p3-floor-row">
        ${[1,2,3,4,5,6,7,8].map(n => `<button data-val="${n}" class="${selFloor===String(n)?'selected':''}">${n}</button>`).join('')}
      </div>
      <div class="p3-sheet-foot">
        <button class="p3-clear-all" id="p3-sheet-clear">Clear all</button>
        <button class="p3-apply" id="p3-sheet-apply">Apply</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  // Position sheet beneath the trigger
  const sheet = document.getElementById('p3-filter-sheet');
  const rect = anchorEl.getBoundingClientRect();
  const sheetWidth = 400;
  let left = rect.right - sheetWidth;
  if (left < 20) left = 20;
  if (left + sheetWidth > window.innerWidth - 20) left = window.innerWidth - sheetWidth - 20;
  sheet.style.left = left + 'px';
  sheet.style.top = (rect.bottom + 8 + window.scrollY) + 'px';

  // Click outside to close (but not on the sheet itself)
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) backdrop.remove();
  });

  // Option selection (toggle on/off)
  document.querySelectorAll('#p3-agency-row button').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.val;
      if (selAgency === val) { selAgency = 'all'; }
      else { selAgency = val; }
      document.querySelectorAll('#p3-agency-row button').forEach(b => {
        b.classList.toggle('selected', b.dataset.val === selAgency);
      });
    });
  });
  document.querySelectorAll('#p3-floor-row button').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.val;
      if (selFloor === val) { selFloor = 'all'; }
      else { selFloor = val; }
      document.querySelectorAll('#p3-floor-row button').forEach(b => {
        b.classList.toggle('selected', b.dataset.val === selFloor);
      });
    });
  });

  // Clear all (inside sheet)
  document.getElementById('p3-sheet-clear').addEventListener('click', () => {
    selAgency = 'all';
    selFloor = 'all';
    document.querySelectorAll('#p3-agency-row button, #p3-floor-row button').forEach(b => b.classList.remove('selected'));
  });

  // Apply
  document.getElementById('p3-sheet-apply').addEventListener('click', () => {
    state.filterAgency = selAgency;
    state.filterFloor = selFloor;
    backdrop.remove();
    render();
  });
}

function renderEmptyState() {
  const hasSearch = state.search && state.search.trim().length > 0;
  const hasFilter = state.filterAgency !== 'all' || state.filterFloor !== 'all' || state.activeTab !== 'all';
  const totalItems = state.items.filter(i => i.status !== 'reunited').length;

  // Search-empty state
  if (hasSearch) {
    const q = escapeHtml(state.search.trim());
    return `
      <div class="p3-empty">
        <h2 class="p3-empty-headline">No <em>match</em>.</h2>
        <p class="p3-empty-body">Nothing matches <b>\u201c${q}\u201d</b>. If you\u2019ve lost yours, file it \u2014 someone here might have picked it up.</p>
        <div class="p3-empty-actions">
          <button class="text" id="p3-clear-search">\u2190 Clear search</button>
          <button class="primary" id="p3-empty-file">+ File a ticket</button>
        </div>
      </div>
    `;
  }

  // Filter-empty state
  if (hasFilter && totalItems > 0) {
    const parts = [];
    if (state.filterAgency !== 'all') parts.push(escapeHtml(state.filterAgency));
    if (state.filterFloor !== 'all') parts.push('Floor ' + escapeHtml(state.filterFloor));
    if (state.activeTab === 'lost') parts.push('Lost');
    else if (state.activeTab === 'found') parts.push('Found');
    else if (state.activeTab === 'mine') parts.push('Mine');
    const label = parts.join(' \u00b7 ');
    return `
      <div class="p3-empty">
        <h2 class="p3-empty-headline">Nothing in <em>that</em> corner.</h2>
        <p class="p3-empty-body">No tickets match ${label} right now.</p>
        <div class="p3-empty-actions">
          <button class="text" id="p3-clear-filters">\u2190 Clear filters</button>
          <button class="primary" id="p3-empty-file">+ File a ticket</button>
        </div>
      </div>
    `;
  }

  // Day-one state
  const tipsSeen = (() => { try { return localStorage.getItem(LS_TIPS_SEEN) === '1'; } catch(e) { return false; } })();
  const tipsBlock = tipsSeen ? '' : `
        <div class="p3-empty-tips">
          <div class="p3-empty-tips-label">How this works</div>
          <ol class="p3-empty-tips-list">
            <li><span class="num">01</span><span>Lost something or found something. <b>File a ticket</b> with a short description.</span></li>
            <li><span class="num">02</span><span>The other person sees it, claims it, and reveals their contact.</span></li>
            <li><span class="num">03</span><span>You meet, you swap, you confirm with a <b>4-digit handoff code</b>.</span></li>
          </ol>
        </div>
  `;
  // Mark tips as seen after first render
  if (!tipsSeen) {
    setTimeout(() => { try { localStorage.setItem(LS_TIPS_SEEN, '1'); } catch(e) {} }, 100);
  }
  return `
    <div class="p3-empty">
      <h2 class="p3-empty-headline">A <em>quiet</em> beginning.</h2>
      <p class="p3-empty-body">Nothing has been lost or found here yet.</p>
      <div class="p3-empty-actions">
        <button class="primary" id="p3-empty-file">+ File the first ticket</button>
      </div>
      ${tipsBlock}
    </div>
  `;
}

function emptyStateMessage() {
  if (state.search) return 'Nothing matched. Try a different word, or a different floor.';
  if (state.activeTab === 'mine') return 'You haven\'t posted or claimed anything here yet.';
  if (state.activeTab === 'lost') return 'Nothing lost just now. A small mercy.';
  if (state.activeTab === 'found') return 'Nothing found, nothing waiting to be claimed.';
  if (state.filterAgency !== 'all' || state.filterFloor !== 'all') {
    return 'No items match that filter.';
  }
  return 'Nothing here yet. Which is either a very good day in the building, or a very quiet one.';
}

function emptyStateSub() {
  if (state.activeTab === 'mine') return 'Once you post or claim, your items appear here.';
  if (state.filterAgency !== 'all' || state.filterFloor !== 'all') return 'Try clearing a filter above.';
  if (state.search) return '';
  return 'Be the first — click File a ticket above.';
}

function renderReunitedStrip() {
  const slot = document.getElementById('reunited-strip-slot');
  if (!slot) return;
  // Don't show strip in the Mine tab (reunited items already appear inline there)
  if (state.activeTab === 'mine') { slot.innerHTML = ''; return; }

  const reunited = reunitedItems();
  if (reunited.length === 0) { slot.innerHTML = ''; return; }

  const expandedClass = state.showReunited ? 'expanded' : '';
  const content = state.showReunited
    ? `<div class="reunited-strip-content">${reunited.map(renderCard).join('')}</div>`
    : '';

  slot.innerHTML = `
    <div class="reunited-strip">
      <button class="reunited-strip-toggle ${expandedClass}" id="reunited-toggle">
        <span class="count">${reunited.length}</span>
        <span class="label">reunited item${reunited.length === 1 ? '' : 's'}</span>
        <span class="chev">▾</span>
      </button>
      ${content}
    </div>
  `;
  const toggle = document.getElementById('reunited-toggle');
  if (toggle) toggle.addEventListener('click', () => {
    state.showReunited = !state.showReunited;
    render();
  });
}

function bindShellEvents() {
  document.querySelectorAll('.p3-tabs button[data-tab]').forEach(el => el.addEventListener('click', () => {
    state.activeTab = el.dataset.tab;
    render();
  }));
  const search = document.getElementById('search');
  if (search) search.addEventListener('input', (e) => {
    state.search = e.target.value;
    render();
  });
  const postBtn = document.getElementById('post-btn');
  if (postBtn) postBtn.addEventListener('click', () => openPostModal());

  const lbBtn = document.getElementById('leaderboard-btn');
  if (lbBtn) lbBtn.addEventListener('click', () => openLeaderboardModal());

  // Phase 3: filter trigger opens popover sheet
  const filterTrigger = document.getElementById('p3-filter-trigger');
  if (filterTrigger) filterTrigger.addEventListener('click', (e) => {
    e.stopPropagation();
    openFilterSheet(filterTrigger);
  });

  // Phase 3: chip-level remove (X button on each active filter chip)
  document.querySelectorAll('.p3-chip[data-remove-filter]').forEach(el => {
    el.addEventListener('click', () => {
      const which = el.dataset.removeFilter;
      if (which === 'agency') state.filterAgency = 'all';
      else if (which === 'floor') state.filterFloor = 'all';
      render();
    });
  });

  // Phase 3: clear all filters
  const clearAll = document.getElementById('p3-clear-all');
  if (clearAll) clearAll.addEventListener('click', () => {
    state.filterAgency = 'all';
    state.filterFloor = 'all';
    state.activeTab = 'all';
    render();
  });

  // Phase 3: empty state actions
  const emptyFile = document.getElementById('p3-empty-file');
  if (emptyFile) emptyFile.addEventListener('click', () => openPostModal());
  const clearSearch = document.getElementById('p3-clear-search');
  if (clearSearch) clearSearch.addEventListener('click', () => {
    state.search = '';
    const s = document.getElementById('search');
    if (s) s.value = '';
    render();
  });
  const clearFilters = document.getElementById('p3-clear-filters');
  if (clearFilters) clearFilters.addEventListener('click', () => {
    state.filterAgency = 'all';
    state.filterFloor = 'all';
    state.activeTab = 'all';
    render();
  });

  const feed = document.getElementById('feed');
  if (feed) feed.addEventListener('click', (e) => {
    // Pill click — toggle status filter
    const pill = e.target.closest('.pill[data-filter]');
    if (pill) {
      const key = pill.dataset.filter;
      state.filterStatus = state.filterStatus === key ? null : key;
      render();
      return;
    }
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    if (btn.dataset.action === 'claim') openClaimModal(id);
    else if (btn.dataset.action === 'start-handoff') startHandoff(id);
    else if (btn.dataset.action === 'show-handoff') showExistingHandoff(id);
    else if (btn.dataset.action === 'enter-handoff') openEnterHandoffModal(id);
    else if (btn.dataset.action === 'scroll-to') {
      const card = document.querySelector(`.card[data-id="${id}"]`);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.classList.add('highlighted');
        setTimeout(() => card.classList.remove('highlighted'), 1800);
      }
    }
  });

  // Pills in the reunited strip (rendered outside .feed) should also filter
  const strip = document.getElementById('reunited-strip-slot');
  if (strip) strip.addEventListener('click', (e) => {
    const pill = e.target.closest('.pill[data-filter]');
    if (pill) {
      const key = pill.dataset.filter;
      state.filterStatus = state.filterStatus === key ? null : key;
      render();
    }
  });
}

    const btn = document.getElementById('c-submit');

    const email = (inputEl ? inputEl.value : knownEmail).trim().toLowerCase();
    if (!email || !email.includes('@')) { toast('Add your email', true); return; }
    const _emailRe2 = /^[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$/i;
    if (!_emailRe2.test(email)) { toast('That email doesn\u2019t look right', true); return; }

      if (!data || !data.length) throw new Error('Item not found');
      const revealed = { email: data[0].email, phone: data[0].phone || '' };

      // waiting for a re-fetch or realtime event. Source of truth still lives
      // on the server; this just avoids the user seeing a stale card.
      const _localItem = state.items.find(x => x.id === item.id);

function openEnterHandoffModal(itemId) {
  const item = state.items.find(x => x.id === itemId);
  if (!item) return;
  const _idx = state.items.findIndex(x => x.id === itemId);
  const _fileNum = _idx >= 0 ? (state.items.length - _idx) : state.items.length;
