<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Concierge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface-muted: #EFEDE6;
    --ink: #1C1C1B;
    --ink-2: #55544F;
    --ink-3: #8F8E88;
    --line: #E4E1D7;
    --line-strong: #CFCBBD;
    --accent: #1C1C1B;
    --lost: #7A2222;
    --lost-bg: #F4E4E3;
    --found: #0F5740;
    --found-bg: #E2EDE5;
    --reunited: #8F8E88;
    --reunited-bg: #EFEDE6;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.03), 0 4px 12px rgba(0,0,0,0.02);
    --shadow-modal: 0 20px 60px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.06);
    --serif: 'Fraunces', 'Iowan Old Style', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, Monaco, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }

  .page { max-width: 980px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ============ Setup screen ============ */
  .setup {
    max-width: 620px;
    margin: 10vh auto 0;
    padding: 32px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
  }
  .setup h2 { font-family: var(--serif); font-size: 32px; font-weight: 500; margin: 0 0 6px; letter-spacing: -0.02em; }
  .setup p { font-size: 14px; color: var(--ink-2); line-height: 1.6; margin: 0 0 12px; }
  .setup code { font-family: var(--mono); font-size: 12px; background: var(--surface-muted); padding: 2px 6px; border-radius: 4px; }
  .setup ol { padding-left: 20px; color: var(--ink-2); font-size: 14px; line-height: 1.7; }

  /* ============ Masthead ============ */
  .mast {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .mast-eyebrow {
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: var(--ink-3);
    letter-spacing: 0.01em;
    margin-bottom: 6px;
  }
  .mast-title {
    font-family: var(--serif);
    font-size: clamp(34px, 5vw, 48px);
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .mast-tag {
    font-size: 14px;
    color: var(--ink-2);
    max-width: 440px;
    line-height: 1.55;
    margin-top: 10px;
  }
  .mast-reunions { text-align: right; }
  .mast-reunions-num {
    font-family: var(--serif);
    font-size: 40px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.02em;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .mast-reunions-num.bumped {
    transform: scale(1.12);
    color: var(--found);
  }
  .mast-reunions-lbl {
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .sync-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4FB774;
  }
  .sync-dot.syncing { background: #E8A33C; animation: pulse 1s ease-in-out infinite; }
  .sync-dot.error { background: #C94A4A; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ============ Toolbar ============ */
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 18px 0 12px;
    flex-wrap: wrap;
  }
  .tabs {
    display: inline-flex;
    background: var(--surface-muted);
    border-radius: 100px;
    padding: 3px;
    gap: 2px;
  }
  .tab {
    border: none;
    background: transparent;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.005em;
    transition: all 0.15s ease;
  }
  .tab.active {
    background: var(--surface);
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .search-wrap { flex: 1; min-width: 220px; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--ink-3); }
  .search {
    width: 100%;
    height: 38px;
    padding: 0 44px 0 38px;
    font-size: 13.5px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 100px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
    transition: border 0.15s ease;
  }
  .search:focus { border-color: var(--line-strong); }
  .search-kbd {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    background: var(--surface-muted);
    padding: 2px 6px;
    border-radius: 4px;
    pointer-events: none;
  }
  .post-btn {
    height: 38px;
    padding: 0 18px;
    font-size: 13.5px;
    font-weight: 500;
    background: var(--ink);
    color: var(--surface);
    border: none;
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.005em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: transform 0.1s ease;
  }
  .post-btn:hover { opacity: 0.92; }
  .post-btn:active { transform: scale(0.98); }

  /* ============ Filters ============ */
  .filters {
    display: flex;
    gap: 6px;
    padding: 0 0 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-right: 6px;
    font-weight: 500;
  }
  .chip {
    border: 1px solid var(--line);
    background: var(--surface);
    padding: 5px 11px;
    font-size: 12px;
    border-radius: 100px;
    cursor: pointer;
    color: var(--ink-2);
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .chip:hover { border-color: var(--line-strong); }
  .chip.active {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }
  .chip-sep {
    width: 1px;
    height: 16px;
    background: var(--line);
    margin: 0 6px;
  }

  /* ============ Me banner ============ */
  .me-banner {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    font-size: 12.5px;
    color: var(--ink-2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 0 0 12px;
  }
  .me-banner b { color: var(--ink); font-weight: 500; font-family: var(--mono); font-size: 12px; }
  .me-banner-link {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12px;
    color: var(--ink-3);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: var(--line);
  }
  .me-banner-link:hover { color: var(--ink); }

  /* ============ Feed ============ */
  .feed {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 6px 0 24px;
    min-height: 200px;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink-3);
    font-size: 14px;
  }

  .card {
    display: grid;
    grid-template-columns: 72px 1fr auto;
    gap: 16px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    align-items: center;
    transition: all 0.2s ease;
  }
  .card:hover { border-color: var(--line-strong); box-shadow: var(--shadow-card); }
  .card.reunited { opacity: 0.5; }
  .card.highlighted {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(28,28,27,0.06);
  }
  .card.just-arrived {
    animation: slideInFade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideInFade {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .thumb {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-md);
    background: var(--surface-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-2);
    flex-shrink: 0;
    overflow: hidden;
  }
  .thumb svg { width: 30px; height: 30px; stroke-width: 1.4; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }

  .card-body { min-width: 0; }
  .card-title {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 500;
    margin: 0 0 4px;
    line-height: 1.25;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .card-desc {
    font-size: 13px;
    color: var(--ink-2);
    margin: 0 0 10px;
    line-height: 1.55;
  }
  .card-meta {
    font-size: 11.5px;
    color: var(--ink-3);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .card-meta .dot {
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: var(--ink-3);
    display: inline-block;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 100px;
    font-weight: 500;
  }
  .pill.lost { background: var(--lost-bg); color: var(--lost); }
  .pill.found { background: var(--found-bg); color: var(--found); }
  .pill.reunited { background: var(--reunited-bg); color: var(--reunited); }

  .card-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-end;
    min-width: 130px;
  }
  .contact {
    font-size: 11.5px;
    color: var(--ink-3);
    font-family: var(--mono);
    word-break: break-all;
    text-align: right;
  }
  .contact.revealed { color: var(--ink-2); }
  .action-btn {
    border: 1px solid var(--line-strong);
    background: var(--surface);
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink);
    white-space: nowrap;
    transition: all 0.15s ease;
  }
  .action-btn:hover { background: var(--surface-muted); }
  .action-btn.primary {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }
  .action-btn.primary:hover { opacity: 0.92; background: var(--ink); }
  .action-btn:disabled { opacity: 0.5; cursor: wait; }

  .matches {
    margin-top: 12px;
    padding: 12px 14px;
    background: var(--surface-muted);
    border-radius: var(--radius-md);
    font-size: 12px;
  }
  .matches-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .matches-title {
    font-weight: 500;
    font-size: 12px;
    color: var(--ink);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .matches-hint {
    color: var(--ink-3);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .match-item {
    font-size: 12.5px;
    color: var(--ink-2);
    padding: 7px 0;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .match-item:first-of-type { border-top: none; padding-top: 2px; }
  .match-item-title {
    font-family: var(--serif);
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
  }
  .match-view-btn {
    background: transparent;
    border: none;
    font-family: inherit;
    font-size: 11px;
    color: var(--ink-3);
    cursor: pointer;
    padding: 2px 0;
    white-space: nowrap;
  }
  .match-view-btn:hover { color: var(--ink); }

  /* ============ Empty state ============ */
  .empty {
    padding: 80px 20px;
    text-align: center;
  }
  .empty-quote {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    color: var(--ink-2);
    max-width: 420px;
    margin: 0 auto 12px;
    line-height: 1.5;
    letter-spacing: -0.005em;
  }
  .empty-sub {
    font-size: 12px;
    color: var(--ink-3);
  }

  /* ============ Modal ============ */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(28,28,27,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 28px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-modal);
    animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .modal-title {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 500;
    margin: 0 0 6px;
    line-height: 1.15;
    letter-spacing: -0.02em;
  }
  .modal-sub {
    font-size: 13px;
    color: var(--ink-2);
    margin: 0 0 22px;
    line-height: 1.55;
  }
  .seg {
    display: flex;
    background: var(--surface-muted);
    border-radius: 100px;
    padding: 3px;
    gap: 2px;
    margin-bottom: 18px;
  }
  .seg button {
    flex: 1;
    border: none;
    background: transparent;
    padding: 8px 14px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink-2);
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
  }
  .seg button.active {
    background: var(--surface);
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .field input,
  .field select,
  .field textarea {
    width: 100%;
    padding: 10px 12px;
    font-size: 13.5px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    font-family: inherit;
    color: var(--ink);
    outline: none;
    transition: border 0.15s ease;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus { border-color: var(--ink); }
  .field textarea {
    resize: vertical;
    min-height: 70px;
    line-height: 1.5;
  }
  .field-hint {
    font-size: 11px;
    color: var(--ink-3);
    margin-top: 5px;
    line-height: 1.4;
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 22px;
    gap: 10px;
  }
  .modal-hint {
    font-size: 11px;
    color: var(--ink-3);
  }
  .btn-group { display: flex; gap: 8px; }
  .btn-secondary {
    padding: 9px 16px;
    background: transparent;
    border: 1px solid var(--line-strong);
    border-radius: 100px;
    font-size: 12.5px;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink);
    font-weight: 500;
  }
  .btn-secondary:hover { background: var(--surface-muted); }
  .btn-primary {
    padding: 9px 18px;
    background: var(--ink);
    color: var(--surface);
    border: none;
    border-radius: 100px;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary:hover { opacity: 0.92; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: wait; }

  .photo-drop {
    border: 1px dashed var(--line-strong);
    border-radius: var(--radius-sm);
    padding: 16px;
    text-align: center;
    font-size: 12px;
    color: var(--ink-3);
    cursor: pointer;
    transition: all 0.15s ease;
    display: block;
  }
  .photo-drop:hover { border-color: var(--ink); color: var(--ink-2); }
  .photo-preview {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    display: block;
    margin: 0 auto;
  }

  .preview-card {
    background: var(--surface-muted);
    padding: 16px;
    border-radius: var(--radius-md);
    margin-bottom: 16px;
  }
  .preview-card-title {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .preview-card-desc {
    font-size: 12.5px;
    color: var(--ink-2);
    margin-bottom: 10px;
    line-height: 1.55;
  }
  .preview-card-meta {
    font-size: 11px;
    color: var(--ink-3);
  }

  .reveal-box {
    background: var(--surface-muted);
    padding: 20px;
    border-radius: var(--radius-md);
    margin-bottom: 16px;
    text-align: center;
  }
  .reveal-label {
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 500;
  }
  .reveal-email {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--ink);
    margin-bottom: 4px;
    word-break: break-all;
  }
  .reveal-phone {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-2);
    margin-top: 6px;
  }

  /* ============ Toast ============ */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--surface);
    padding: 12px 18px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    z-index: 200;
    box-shadow: var(--shadow-modal);
  }
  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error { background: #7A2222; }

  /* ============ Footer ============ */
  .footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 11px;
    color: var(--ink-3);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .footer-kbd { display: inline-flex; gap: 10px; align-items: center; }
  .footer-kbd kbd {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--surface);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--line);
    color: var(--ink-2);
    margin: 0 3px;
  }

  @media (max-width: 600px) {
    .page { padding: 20px 16px 60px; }
    .mast { grid-template-columns: 1fr; gap: 12px; }
    .mast-reunions { text-align: left; }
    .card { grid-template-columns: 56px 1fr; gap: 12px; padding: 14px; }
    .card-actions { grid-column: 1 / -1; flex-direction: row; justify-content: space-between; min-width: 0; align-items: center; }
    .thumb { width: 56px; height: 56px; }
    .thumb svg { width: 24px; height: 24px; }
    .row2 { grid-template-columns: 1fr; }
    .modal { padding: 22px 20px; }
  }
</style>
</head>
<body>

const LS_ME = 'omnicom-concierge-me';

function loadLocal() {
  try {
    state.me = localStorage.getItem(LS_ME) || null;
    state.revealed = JSON.parse(localStorage.getItem(LS_REVEALED) || '{}');
    state.myPosts = JSON.parse(localStorage.getItem(LS_MY_POSTS) || '{}');

}
function saveMe() { try { if (state.me) localStorage.setItem(LS_ME, state.me); } catch(e) {} }

function saveMyPosts() { try { localStorage.setItem(LS_MY_POSTS, JSON.stringify(state.myPosts)); } catch(e) {} }

/* ============ helpers ============ */
function timeAgo(ts) {
  const t = typeof ts === 'string' ? new Date(ts).getTime() : ts;
  const s = Math.floor((Date.now()-t)/1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 86400*7) return Math.floor(s/86400) + 'd ago';
  const d = new Date(t);
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
}
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function similarity(a, b) {
  if (a.kind === b.kind) return 0;
  let score = 0;
  if (a.category === b.category) score += 0.5;
  if (a.floor === b.floor) score += 0.2;
  if (Math.abs(a.floor - b.floor) === 1) score += 0.1;
  if (a.agency === b.agency) score += 0.1;
  const aw = (a.title + ' ' + a.desc).toLowerCase().split(/\W+/).filter(w => w.length > 3);
  const bw = new Set((b.title + ' ' + b.desc).toLowerCase().split(/\W+/).filter(w => w.length > 3));
  const overlap = aw.filter(w => bw.has(w)).length;
  score += Math.min(0.4, overlap * 0.15);
  return score;
}
function findMatches(item) {
  return state.items
    .filter(x => x.kind !== item.kind && x.status === 'open' && x.id !== item.id)
    .map(x => ({ item: x, score: similarity(item, x) }))
    .filter(m => m.score >= 0.55)
    .sort((a,b) => b.score - a.score)
    .slice(0, 3);
}

function visibleItems() {
  return state.items.filter(i => {
    if (state.activeTab !== 'all' && i.kind !== state.activeTab) return false;
    if (state.filterAgency !== 'all' && i.agency !== state.filterAgency) return false;
    if (state.filterFloor !== 'all' && String(i.floor) !== state.filterFloor) return false;
    if (state.search) {
      const q = state.search.toLowerCase().trim();
      if (!q) return true;
      const hay = (i.title + ' ' + i.desc + ' ' + i.agency + ' floor ' + i.floor + ' ' + i.kind).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => {
    if (a.status !== b.status) return a.status === 'open' ? -1 : 1;
    return new Date(b.ts).getTime() - new Date(a.ts).getTime();
  });
}

/* ============ Supabase I/O ============ */
function rowToItem(r) {
  return {
    id: r.id,
    kind: r.kind,
    title: r.title,
    desc: r.description,
    category: r.category,
    agency: r.agency,
    floor: Number(r.floor) || 0,
    emailMasked: r.email_masked || '',
    photo: r.photo || null,
    ts: r.created_at,
    status: r.status || 'open'
  };
}

async function fetchFeed() {
  state.syncStatus = 'syncing';
  updateSyncDot();
  try {
    const { data, error } = await supabase
      .from('concierge_items_public')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) throw error;
    state.items = (data || []).map(rowToItem);
    state.reunionCount = state.items.filter(i => i.status === 'reunited').length;
    state.loading = false;
    state.syncStatus = 'idle';
    render();
  } catch(err) {
    state.syncStatus = 'error';
    state.loading = false;
    render();
    console.error(err);
  }
}

function subscribeRealtime() {
  supabase
    .channel('concierge-items')
    .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'concierge_items' },
        payload => handleRealtimeInsert(payload.new)
    )
    .on('postgres_changes',
        { event: 'UPDATE', schema: 'public', table: 'concierge_items' },
        payload => handleRealtimeUpdate(payload.new)
    )
    .subscribe(status => {
      if (status === 'SUBSCRIBED') {
        state.syncStatus = 'idle';
      } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
        state.syncStatus = 'error';
      }
      updateSyncDot();
    });
}

async function handleRealtimeInsert(row) {
  // We need the masked email, which only the view provides. Fetch just this row.
  try {
    const { data, error } = await supabase
      .from('concierge_items_public')
      .select('*')
      .eq('id', row.id)
      .single();
    if (error || !data) return;
    const item = rowToItem(data);
    if (state.items.some(x => x.id === item.id)) return;
    state.items.unshift(item);
    // Only animate if it's not one I just posted.
    if (!state.myPosts[item.id]) {
      state.recentArrivals.add(item.id);
      setTimeout(() => { state.recentArrivals.delete(item.id); }, 800);
    }
    render();
  } catch(e) { /* ignore */ }
}

function handleRealtimeUpdate(row) {
  const existing = state.items.find(x => x.id === row.id);
  if (!existing) return;
  const wasOpen = existing.status === 'open';
  existing.status = row.status;
  if (wasOpen && row.status === 'reunited') {
    state.reunionCount += 1;
    bumpReunionCounter();
  }
  render();
}

function bumpReunionCounter() {
  const el = document.getElementById('reunion-count');
  if (!el) return;
  el.classList.add('bumped');
  setTimeout(() => el.classList.remove('bumped'), 400);
}

function updateSyncDot() {
  const syncDot = document.querySelector('.sync-dot');
  if (!syncDot) return;
  syncDot.className = 'sync-dot ' + (state.syncStatus === 'syncing' ? 'syncing' : state.syncStatus === 'error' ? 'error' : '');
  const label = syncDot.nextElementSibling;
  if (label) label.textContent = state.syncStatus === 'syncing' ? 'Connecting' : (state.syncStatus === 'error' ? 'Offline — will retry' : 'Live');
}

function renderCard(item) {
  const matches = item.status === 'open' ? findMatches(item) : [];
  const isMine = state.myPosts[item.id] === true;
  const revealed = state.revealed[item.id];
  const photoOrIcon = item.photo
    ? `<div class="thumb"><img src="${item.photo}" alt=""/></div>`
    : `<div class="thumb">${ICONS[item.category] || ICONS.other}</div>`;
  const pillClass = item.status === 'reunited' ? 'reunited' : item.kind;
  const pillText = item.status === 'reunited' ? 'Reunited' : item.kind;
  let contact;
  if (item.status === 'reunited') {
    contact = '<span class="contact" style="opacity:0.5;">Closed</span>';
  } else if (revealed) {
    const phone = revealed.phone ? '<br/>' + escapeHtml(revealed.phone) : '';
    contact = `<span class="contact revealed">${escapeHtml(revealed.email)}${phone}</span>`;
  } else if (isMine && state.me) {
    contact = `<span class="contact revealed">${escapeHtml(state.me)}</span>`;
  } else {
    contact = `<span class="contact">${escapeHtml(item.emailMasked)}</span>`;
  }
  let actionBtn = '';
  if (item.status !== 'reunited') {
    if (isMine || revealed) {
      actionBtn = `<button class="action-btn" data-action="mark-reunited" data-id="${item.id}">Mark reunited ✓</button>`;
    } else {
      actionBtn = `<button class="action-btn primary" data-action="claim" data-id="${item.id}">${item.kind === 'found' ? "It's mine" : 'I found it'}</button>`;
    }
  }

  let matchesHtml = '';
  if (matches.length) {
    matchesHtml = `
      <div class="matches">
        <div class="matches-head">
          <span class="matches-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 12l3 3 5-6"/><circle cx="12" cy="12" r="9"/></svg>
            ${matches.length} possible ${matches.length === 1 ? 'match' : 'matches'}
          </span>
          <span class="matches-hint">Tap to view</span>
        </div>
        ${matches.map(m => `
          <div class="match-item">
            <span class="match-item-title">${escapeHtml(m.item.title)}</span>
            <button class="match-view-btn" data-action="scroll-to" data-id="${m.item.id}">View →</button>
          </div>
        `).join('')}
      </div>`;
  }

  const arrivedClass = state.recentArrivals.has(item.id) ? 'just-arrived' : '';

  return `
    <article class="card ${item.status === 'reunited' ? 'reunited' : ''} ${arrivedClass}" data-id="${item.id}">
      ${photoOrIcon}
      <div class="card-body">
        <h3 class="card-title">${escapeHtml(item.title)}</h3>
        <p class="card-desc">${escapeHtml(item.desc)}</p>
        <div class="card-meta">
          <span class="pill ${pillClass}">${pillText}</span>
          <span>Floor ${item.floor}</span><span class="dot"></span>
          <span>${escapeHtml(item.agency)}</span><span class="dot"></span>
          <span>${timeAgo(item.ts)}</span>
        </div>
        ${matchesHtml}
      </div>
      <div class="card-actions">
        ${contact}
        ${actionBtn}
      </div>
    </article>
  `;
}

function render() {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return;

  const rCount = document.getElementById('reunion-count');
  if (rCount) rCount.textContent = state.reunionCount;

  updateSyncDot();

  const banner = document.getElementById('me-banner-slot');
  if (banner) {
    if (state.me) {
      banner.innerHTML = `<div class="me-banner"><span>Posting as <b>${escapeHtml(state.me)}</b></span><button class="me-banner-link" id="change-me">Change</button></div>`;
      const cm = document.getElementById('change-me');
      if (cm) cm.addEventListener('click', () => {
        state.me = null;
        try { localStorage.removeItem(LS_ME); } catch(e) {}
        render();
        toast('Identity cleared');
      });
    } else {
      banner.innerHTML = '';
    }
  }

  const feed = document.getElementById('feed');
  if (!feed) return;
  if (state.loading) {
    feed.innerHTML = '<div class="loading">Fetching the day\'s strays…</div>';
    return;
  }
  const items = visibleItems();
  if (items.length === 0) {
    const emptyQuote = state.search
      ? 'Nothing matched. Try a different word, or a different floor.'
      : 'Nothing here yet. Which is either a very good day in the building, or a very quiet one.';
    feed.innerHTML = `<div class="empty"><div class="empty-quote">${emptyQuote}</div><div class="empty-sub">Be the first to post — click New post above.</div></div>`;
  } else {
    feed.innerHTML = items.map(renderCard).join('');
  }
}

function bindShellEvents() {
  document.querySelectorAll('.tab').forEach(el => el.addEventListener('click', () => {
    state.activeTab = el.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === el));
    render();
  }));
  document.querySelectorAll('.chip').forEach(el => el.addEventListener('click', () => {
    const f = el.dataset.filter;
    if (f === 'agency') state.filterAgency = el.dataset.value;
    else if (f === 'floor') state.filterFloor = el.dataset.value;
    document.querySelectorAll(`.chip[data-filter="${f}"]`).forEach(c => c.classList.toggle('active', c === el));
    render();
  }));
  const search = document.getElementById('search');
  if (search) search.addEventListener('input', (e) => {
    state.search = e.target.value;
    render();
  });
  const postBtn = document.getElementById('post-btn');
  if (postBtn) postBtn.addEventListener('click', () => openPostModal());

  const feed = document.getElementById('feed');
  if (feed) feed.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    if (btn.dataset.action === 'claim') openClaimModal(id);
    else if (btn.dataset.action === 'mark-reunited') handleReunite(id);
    else if (btn.dataset.action === 'scroll-to') {
      const card = document.querySelector(`.card[data-id="${id}"]`);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.classList.add('highlighted');
        setTimeout(() => card.classList.remove('highlighted'), 1800);
      }
    }
  });
}

/* ============ toast & modal ============ */
function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast visible' + (isError ? ' error' : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.className = 'toast', 2800);
}
function openModal(html) {
  const root = document.getElementById('modal-root');
  root.innerHTML = '<div class="modal-bg" id="modal-bg">' + html + '</div>';
  document.getElementById('modal-bg').addEventListener('click', (e) => {
    if (e.target.id === 'modal-bg') closeModal();
  });
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

/* ============ post modal ============ */
function openPostModal(prefillKind) {
  let currentKind = prefillKind || 'lost';
  const rememberedEmail = state.me || '';
  openModal(`
    <div class="modal" role="dialog">
      <h2 class="modal-title">Tell us what's happened</h2>
      <p class="modal-sub">A clear description helps the other half of this puzzle find you faster.</p>
      <div class="seg" id="kind-seg">
        <button type="button" data-kind="lost" class="${currentKind==='lost'?'active':''}">I've lost something</button>
        <button type="button" data-kind="found" class="${currentKind==='found'?'active':''}">I've found something</button>
      </div>
      <div class="field">
        <label>Item</label>
        <input type="text" id="f-title" placeholder="e.g. Black umbrella, wooden handle" maxlength="80"/>
      </div>
      <div class="field">
        <label>A line or two about it</label>
        <textarea id="f-desc" placeholder="Where, when, any distinguishing marks" maxlength="240"></textarea>
      </div>
      <div class="row2">
        <div class="field">
          <label>Floor</label>
          <select id="f-floor">${[1,2,3,4,5,6,7,8].map(n => `<option value="${n}">${n}</option>`).join('')}</select>
        </div>
        <div class="field">
          <label>Agency</label>
          <select id="f-agency">${AGENCIES.map(a => `<option value="${a}">${a}</option>`).join('')}</select>
        </div>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="f-cat">${CATEGORIES.map(c => `<option value="${c.id}">${c.label}</option>`).join('')}</select>
      </div>
      <div class="field">
        <label>Your work email</label>
        <input type="email" id="f-email" placeholder="enter your email" value="${escapeHtml(rememberedEmail)}"/>
        <div class="field-hint">Hidden from others until someone claims the item.</div>
      </div>
      <div class="field">
        <label>Phone (optional)</label>
        <input type="tel" id="f-phone" placeholder="Share only if you prefer this over email"/>
      </div>
      <div class="field">
        <label>Photo (optional)</label>
        <label for="f-photo" class="photo-drop" id="f-photo-drop">Tap to attach a photo</label>
        <input type="file" id="f-photo" accept="image/*" style="display:none"/>
      </div>
      <div class="modal-actions">
        <div class="modal-hint">Posts stay until marked reunited.</div>
        <div class="btn-group">
          <button class="btn-secondary" id="f-cancel">Cancel</button>
          <button class="btn-primary" id="f-submit">Post</button>
        </div>
      </div>
    </div>
  `);

  let photoData = null;
  const modal = document.querySelector('.modal');
  setTimeout(() => { const el = document.getElementById('f-title'); if (el) el.focus(); }, 50);

  modal.querySelectorAll('#kind-seg button').forEach(b => b.addEventListener('click', () => {
    currentKind = b.dataset.kind;
    modal.querySelectorAll('#kind-seg button').forEach(x => x.classList.toggle('active', x === b));
  }));

  document.getElementById('f-photo').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 400;
        const ratio = Math.min(max / img.width, max / img.height, 1);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        photoData = canvas.toDataURL('image/jpeg', 0.65);
        document.getElementById('f-photo-drop').innerHTML = `<img src="${photoData}" class="photo-preview" alt=""/>`;
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('f-cancel').addEventListener('click', closeModal);
  document.getElementById('f-submit').addEventListener('click', async () => {
    const btn = document.getElementById('f-submit');
    const title = document.getElementById('f-title').value.trim();
    const desc = document.getElementById('f-desc').value.trim();
    const email = document.getElementById('f-email').value.trim().toLowerCase();
    const floor = parseInt(document.getElementById('f-floor').value);
    const agency = document.getElementById('f-agency').value;
    const cat = document.getElementById('f-cat').value;
    const phone = document.getElementById('f-phone').value.trim();
    if (!title) { toast('Please add an item name', true); document.getElementById('f-title').focus(); return; }
    if (!desc) { toast('Please add a short description', true); document.getElementById('f-desc').focus(); return; }
    if (!email || !email.includes('@')) { toast('Please add your work email', true); document.getElementById('f-email').focus(); return; }
    const domain = email.split('@')[1];
    if (!VALID_DOMAINS.includes(domain)) { toast('Please use your @omc.com email', true); document.getElementById('f-email').focus(); return; }

    btn.disabled = true;
    btn.textContent = 'Posting…';
    const id = 'i' + Date.now() + Math.random().toString(36).slice(2, 6);
    try {
      const { error } = await supabase.from('concierge_items').insert({
        id, kind: currentKind, title, description: desc, category: cat,
        agency, floor, email, phone, photo: photoData, status: 'open'
      });
      if (error) throw error;
      state.me = email;
      state.myPosts[id] = true;
      saveMe();
      saveMyPosts();
      closeModal();
      toast('Posted. We\'ll hold it with care.');
      // Realtime will deliver the new row, but be defensive.
      setTimeout(() => {
        const card = document.querySelector(`.card[data-id="${id}"]`);
        if (card) {
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          card.classList.add('highlighted');
          setTimeout(() => card.classList.remove('highlighted'), 1800);
        }
      }, 500);
    } catch(err) {
      btn.disabled = false;
      btn.textContent = 'Post';
      toast(err.message || 'Could not post — check connection', true);
      console.error(err);
    }
  });
}

/* ============ claim modal ============ */
function openClaimModal(itemId) {
  const item = state.items.find(x => x.id === itemId);
  if (!item) return;
  const isFound = item.kind === 'found';
  openModal(`
    <div class="modal" role="dialog">
      <h2 class="modal-title">${isFound ? 'Is this yours?' : 'Have you found this?'}</h2>
      <p class="modal-sub">${isFound ? 'Claiming reveals the finder\'s contact to you so you can arrange to pick it up.' : 'Revealing reveals the owner\'s contact to you so you can return it.'}</p>
      <div class="preview-card">
        <div class="preview-card-title">${escapeHtml(item.title)}</div>
        <div class="preview-card-desc">${escapeHtml(item.desc)}</div>
        <div class="preview-card-meta">Floor ${item.floor} · ${escapeHtml(item.agency)} · ${timeAgo(item.ts)}</div>
      </div>
      <div class="field">
        <label>Your work email</label>
        <input type="email" id="c-email" placeholder="you@omc.com" value="${escapeHtml(state.me || '')}"/>
        <div class="field-hint">Verifies you're in the building. Logged with the reveal.</div>
      </div>
      <div class="modal-actions">
        <div class="modal-hint"></div>
        <div class="btn-group">
          <button class="btn-secondary" id="c-cancel">Cancel</button>
          <button class="btn-primary" id="c-submit">Reveal contact</button>
        </div>
      </div>
    </div>
  `);
  setTimeout(() => { const el = document.getElementById('c-email'); if (el) el.focus(); }, 50);

  document.getElementById('c-cancel').addEventListener('click', closeModal);
  document.getElementById('c-submit').addEventListener('click', async () => {
    const btn = document.getElementById('c-submit');
    const email = document.getElementById('c-email').value.trim().toLowerCase();
    if (!email || !email.includes('@')) { toast('Please add your email', true); return; }
    if (!VALID_DOMAINS.includes(email.split('@')[1])) { toast('Please use your @omc.com email', true); return; }
    btn.disabled = true;
    btn.textContent = 'Revealing…';
    try {
      const { data, error } = await supabase.rpc('reveal_contact', {
        p_item_id: item.id,
        p_claimer_email: email
      });
      if (error) throw error;
      if (!data || !data.length) throw new Error('Item not found');
      const revealed = { email: data[0].email, phone: data[0].phone || '' };
      state.me = email;
      state.revealed[item.id] = revealed;
      saveMe();
      saveRevealed();
      showRevealModal(item, revealed);
      render();
    } catch(err) {
      btn.disabled = false;
      btn.textContent = 'Reveal contact';
      toast(err.message || 'Could not reveal — try again', true);
    }
  });
}

function showRevealModal(item, reveal) {
  const phoneLine = reveal.phone ? `<div class="reveal-phone">${escapeHtml(reveal.phone)}</div>` : '';
  openModal(`
    <div class="modal" role="dialog">
      <h2 class="modal-title">Contact revealed</h2>
      <p class="modal-sub">Reach out directly. Once the item changes hands, either of you can mark it reunited.</p>
      <div class="reveal-box">
        <div class="reveal-label">${item.kind === 'found' ? 'Found by' : 'Lost by'}</div>
        <div class="reveal-email">${escapeHtml(reveal.email)}</div>
        ${phoneLine}
      </div>
      <div class="modal-actions">
        <div class="modal-hint"></div>
        <div class="btn-group">
          <button class="btn-secondary" id="r-copy">Copy email</button>
          <button class="btn-primary" id="r-done">Got it</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('r-done').addEventListener('click', closeModal);
  document.getElementById('r-copy').addEventListener('click', () => {
    try {
      navigator.clipboard.writeText(reveal.email);
      toast('Email copied');
    } catch(e) { toast('Could not copy — select manually', true); }
  });
}

async function handleReunite(itemId) {
  if (!state.me) { toast('Please post or claim first to identify yourself', true); return; }
  try {
    const { error } = await supabase
      .from('concierge_items')
      .update({ status: 'reunited', updated_at: new Date().toISOString() })
      .eq('id', itemId);
    if (error) throw error;
    toast('Reunited · one less orphan in the building');
    // Realtime UPDATE will flow back through the subscription and refresh the UI.
  } catch(err) {
    toast('Could not update — try again', true);
  }
}

/* ============ keyboard ============ */
document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea, select')) {
    if (e.key === 'Escape') e.target.blur();
    return;
  }
  if (e.key === '/') { e.preventDefault(); const s = document.getElementById('search'); if (s) s.focus(); }
  else if (e.key === 'n' || e.key === 'N') { e.preventDefault(); if (SUPABASE_URL) openPostModal(); }
  else if (e.key === 'Escape') closeModal();
});

/* ============ boot ============ */
loadLocal();
if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
  renderSetupScreen();
} else if (!window.supabase || !window.supabase.createClient) {
  // The Supabase CDN script didn't load — show a helpful message instead of a blank page.
  document.getElementById('app-root').innerHTML = `
    <div class="setup">
      <div style="font-family:var(--serif);font-style:italic;font-size:13px;color:var(--ink-3);margin-bottom:6px;">Building Services</div>
      <h2>Connection blocked</h2>
      <p>The Concierge couldn't reach the Supabase client library at <code>cdn.jsdelivr.net</code>. This usually means a network firewall, ad-blocker, or browser extension is interfering.</p>
      <p>Try: (1) disabling any ad-blocker for this page, (2) opening in a different browser, or (3) asking IT to whitelist <code>cdn.jsdelivr.net</code> and <code>*.supabase.co</code>.</p>
    </div>
  `;
} else {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  renderShell();
  fetchFeed();
  subscribeRealtime();
}

})(); // end IIFE
</script>
</body>
</html>
